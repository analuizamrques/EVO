<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO Word Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --wheel-diam: 55vmin;
            --wheel-max: 160px;
        }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 50%, #16162a 100%);
            color: #fff;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* === TOP ZONE: CROSSWORD (60%) === */
        .top-zone {
            flex: 0 0 58%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        
        .header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ffd700, #ff9500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stats { display: flex; gap: 16px; font-size: 0.8rem; }
        .stat-num { color: #ffd700; font-weight: 700; }
        
        .level-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #ffd700;
        }
        
        .progress {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 8px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff9500);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        
        /* Crossword grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.15);
            width: 100%;
            max-width: 220px;
        }
        
        .cell {
            aspect-ratio: 1;
            min-width: 32px;
            background: rgba(40,40,60,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            color: transparent;
            transition: all 0.25s ease;
        }
        
        .cell.has-letter {
            background: rgba(255,255,255,0.08);
        }
        
        .cell.found {
            background: linear-gradient(145deg, #ffd700, #ff9500);
            color: #1a1a1a;
            border-color: #ffd700;
            box-shadow: 0 2px 8px rgba(255,215,0,0.3);
        }
        
        /* Current word display */
        .current-word {
            display: flex;
            gap: 4px;
            margin-top: 10px;
            min-height: 32px;
        }
        
        .char-box {
            width: 28px;
            height: 34px;
            background: rgba(255,255,255,0.08);
            border-bottom: 2px solid #ffd700;
            border-radius: 6px 6px 4px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffd700;
        }
        
        .char-box.empty {
            background: transparent;
            border-bottom-color: rgba(255,255,255,0.2);
        }
        
        /* === BOTTOM ZONE: INPUT (40%) === */
        .bottom-zone {
            flex: 0 0 42%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px 0 20px;
        }
        
        /* Letter wheel - CONTROL INPUT, NOT visual centerpiece */
        .wheel-box {
            width: min(55vmin, 150px);
            height: min(55vmin, 150px);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a45, #15152a);
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.1);
            position: relative;
            border: 2px solid rgba(255,215,0,0.2);
        }
        
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 28px;
            background: linear-gradient(145deg, #1a1a30, #0f0f20);
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: #ffd700;
            z-index: 10;
        }
        
        .letters-layer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
        }
        
        .letter {
            position: absolute;
            width: 32px;
            height: 32px;
            background: linear-gradient(145deg, #3a3a55, #252540);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 5;
            transition: transform 0.1s ease, border-color 0.1s ease;
        }
        
        .letter:hover, .letter:active {
            transform: scale(1.08);
            border-color: #ffd700;
        }
        
        .letter.selected {
            background: linear-gradient(145deg, #ffd700, #ff9500);
            color: #1a1a1a;
            border-color: #ffd700;
            box-shadow: 0 0 12px rgba(255,215,0,0.4);
        }
        
        /* SVG trail */
        .trail-svg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 3;
        }
        
        .trail-path {
            stroke: #ffd700;
            stroke-width: 3;
            stroke-linecap: round;
            fill: none;
            opacity: 0.7;
        }
        
        /* Buttons */
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        
        .btn:active { transform: scale(0.95); }
        .btn-shuffle { background: linear-gradient(145deg, #3b82f6, #2563eb); color: #fff; }
        .btn-clear { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-submit { background: linear-gradient(145deg, #ffd700, #ff9500); color: #1a1a1a; }
        
        /* Popup */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .popup.success { background: linear-gradient(145deg, #ffd700, #ff9500); color: #1a1a1a; }
        .popup.bonus { background: linear-gradient(145deg, #3b82f6, #2563eb); color: #fff; }
        .popup.error { background: #ef4444; color: #fff; }
        .popup.win { background: linear-gradient(145deg, #10b981, #059669); color: #fff; font-size: 1.2rem; }
    </style>
</head>
<body>
    <!-- TOP ZONE: Crossword (60%) -->
    <div class="top-zone">
        <div class="header">
            <h1>🔥 EVO</h1>
            <div class="stats">
                <div>Nivel <span class="stat-num" id="level">1</span></div>
                <div>Puntos <span class="stat-num" id="score">0</span></div>
            </div>
        </div>
        
        <div class="level-info">
            <span>🎯</span>
            <span>Nivel <span id="level-num">1</span> · <span id="found">0</span>/<span id="total">2</span></span>
        </div>
        
        <div class="progress">
            <div class="progress-fill" id="progress" style="width:0%"></div>
        </div>
        
        <div class="grid" id="grid"></div>
        
        <div class="current-word" id="current"></div>
    </div>
    
    <!-- BOTTOM ZONE: Input (40%) -->
    <div class="bottom-zone">
        <div class="wheel-box" id="wheel">
            <div class="wheel-center" id="center">-</div>
            <svg class="trail-svg"><path class="trail-path" id="trail"/></svg>
        </div>
        
        <div class="buttons">
            <button class="btn btn-shuffle" onclick="shuffle()">🔀</button>
            <button class="btn btn-clear" onclick="clear()">🗑️</button>
            <button class="btn btn-submit" onclick="submit()">✓</button>
        </div>
    </div>
    
    <div class="popup" id="popup"></div>
    
    <script>
        // Data
        const LEVELS = [
            {l:['A','R','T','E'], t:['ARTE','TEAR']},
            {l:['A','M','O','R'], t:['AMOR','MORA']},
            {l:['A','B','C','O'], t:['CABO','BOCA']},
            {l:['A','C','E','R'], t:['CARA','AREA']},
            {l:['A','D','I','O'], t:['DIA','IDA']},
            {l:['O','S','A','P'], t:['PASO','SAPO']},
            {l:['A','N','O','S'], t:['NOSA','SON']},
            {l:['A','E','L','V'], t:['VALE','LAVE']},
            {l:['E','R','O','S'], t:['SERO','ROSE']},
            {l:['I','R','A','D'], t:['RIDA','IRA']}
        ];
        
        const WORDS = new Set([
            'arte','tear','area','cabe','casa','boca','echo','hay','mora','rayo','reya','rueda','saco','sed','seda','sido','sube','tema','tiba','tiene','tino','tira','todo','tono','trae','uso','ve','via','vie','voz','yo','amor','cabo','cosa','dia','ida','amor','mar','casa','cosa','vida','noche','dia','amor','agua','aire','alto','ante','arte','avion','bajo','bien','brazo','bueno','cabeza','cada','cafe','calle','cama','camino','campo','cara','carne','carta','cerca','cielo','cinco','color','costa','cruz','cuatro','cuerpo','dicho','dolor','donde','dulce','duro','edad','ella','error','falso','falta','fama','favor','fecha','feliz','feria','fiesta','flor','fondo','forma','fuego','fuente','fuerza','frio','gallo','ganga','gato','genio','gente','gota','gozo','grado','grande','grito','grupo','guapo','hacer','hacia','hasta','hecho','helado','heroe','hijo','hoja','hombre','hora','hotel','huevo','idea','igual','isla','jardin','jefe','joven','juez','jugar','junto','lado','lago','largo','leche','leer','legal','lejos','lengua','leon','letra','libre','libro','linea','lista','lobo','loco','lucha','lugar','luz','madera','madre','mala','malo','mana','mano','mapa','mar','marca','marco','marido','masa','mayor','media','medio','mejor','menos','mente','mesa','metal','metro','miedo','miel','mirar','mismo','moda','modo','mono','monte','moral','morir','mover','mucho','muerte','mujer','mundo','nacer','nada','nadie','nariz','nata','nave','negro','nieve','nivel','noche','nombre','norte','nota','nube','nunca','obra','oceano','ocupa','ola','opera','orden','oro','otro','oveja','padre','pagar','pais','palabra','palma','pan','papel','para','parar','pared','parte','pasar','paso','pasta','paz','pecho','pedir','pena','pensar','pera','perder','perro','pesca','pie','piedra','piel','pierna','pieza','pino','pintor','piso','planta','plata','playa','plaza','pluma','pobre','poco','poder','poeta','polo','poner','portal','precio','prensa','primo','pronto','prueba','pueblo','puerta','pues','punto','quedar','querer','quien','quinto','quitar','rana','raro','rata','rayo','raza','razon','receta','regla','reino','reloj','resto','rey','rico','rima','rincon','rio','ritmo','robar','roca','rojo','romper','ropa','rostro','rubio','rueda','ruido'
        ]);
        
        // State
        let level = 0;
        let letters = [];
        let targets = [];
        let found = [];
        let swipe = [];
        let placements = [];
        let score = 0;
        
        // Init
        function init() {
            const lvl = LEVELS[level % LEVELS.length];
            letters = shuffle([...lvl.l]);
            targets = lvl.t;
            found = [];
            swipe = [];
            
            document.getElementById('level').textContent = level + 1;
            document.getElementById('level-num').textContent = level + 1;
            document.getElementById('total').textContent = targets.length;
            
            render();
        }
        
        function render() {
            renderWheel();
            renderGrid();
            updateUI();
        }
        
        // Wheel rendering - CONTROL INPUT
        function renderWheel() {
            // Calculate circle parameters based on wheel-box size
            const wheelBox = document.getElementById('wheel');
            const boxSize = Math.min(wheelBox.offsetWidth, wheelBox.offsetHeight);
            const cx = boxSize / 2;
            const r = boxSize * 0.32; // Letters at 32% of box
            
            const layer = document.getElementById('wheel').querySelector('.letters-layer') || createLettersLayer();
            
            // Clear existing letters
            layer.innerHTML = '';
            
            const n = letters.length;
            letters.forEach((letter, i) => {
                const angle = (i * 360 / n - 90) * Math.PI / 180;
                const x = cx + r * Math.cos(angle);
                const y = cx + r * Math.sin(angle);
                
                const el = document.createElement('div');
                el.className = 'letter';
                el.textContent = letter;
                el.style.left = (x - 16) + 'px'; // half of 32px
                el.style.top = (y - 16) + 'px';
                el.dataset.i = i;
                el.onclick = () => selectLetter(i);
                
                layer.appendChild(el);
            });
            
            // Store for trail
            window._wheelParams = { cx, r, n };
        }
        
        function createLettersLayer() {
            const layer = document.createElement('div');
            layer.className = 'letters-layer';
            document.getElementById('wheel').appendChild(layer);
            return layer;
        }
        
        function selectLetter(i) {
            if (!swipe.includes(i)) {
                swipe.push(i);
                updateSwipe();
                if (navigator.vibrate) navigator.vibrate(10);
            }
        }
        
        function updateSwipe() {
            const { cx, r, n } = window._wheelParams || { cx: 60, r: 20, n: 4 };
            
            // Highlight letters
            document.querySelectorAll('.letter').forEach((el, i) => {
                el.classList.toggle('selected', swipe.includes(i));
            });
            
            // Center display
            const word = swipe.map(i => letters[i]).join('');
            document.getElementById('center').textContent = word || '-';
            
            // Draw trail
            const trail = document.getElementById('trail');
            if (swipe.length < 2) {
                trail.setAttribute('d', '');
            } else {
                let d = '';
                swipe.forEach((idx, i) => {
                    const angle = (idx * 360 / n - 90) * Math.PI / 180;
                    const x = cx + r * Math.cos(angle);
                    const y = cx + r * Math.sin(angle);
                    d += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
                });
                trail.setAttribute('d', d);
            }
            
            // Show current word
            const cur = document.getElementById('current');
            cur.innerHTML = '';
            const maxLen = Math.max(...targets.map(t => t.length));
            const chars = [...word];
            for (let i = 0; i <= maxLen; i++) {
                const div = document.createElement('div');
                div.className = 'char-box' + (chars[i] ? '' : ' empty');
                div.textContent = chars[i] || '';
                cur.appendChild(div);
            }
        }
        
        // Grid rendering - PRIMARY ELEMENT
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const size = 5;
            const w1 = targets[0] || 'ARTE';
            const w2 = targets[1] || 'TEAR';
            
            placements = [
                { word: w1, col: 1, row: 2, dir: 'h' }
            ];
            
            // Cross second word
            outer: for (let i = 0; i < w1.length; i++) {
                for (let j = 0; j < w2.length; j++) {
                    if (w1[i] === w2[j]) {
                        placements.push({ word: w2, col: 1 + i, row: 2 - j, dir: 'v' });
                        break outer;
                    }
                }
            }
            
            if (placements.length < 2) {
                placements.push({ word: w2, col: 0, row: 2, dir: 'v' });
            }
            
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    let letter = null;
                    let isFound = false;
                    
                    for (const pl of placements) {
                        if (pl.dir === 'h') {
                            if (r === pl.row && c >= pl.col && c < pl.col + pl.word.length) {
                                letter = pl.word[c - pl.col];
                                isFound = found.includes(pl.word);
                                break;
                            }
                        } else {
                            if (c === pl.col && r >= pl.row && r < pl.row + pl.word.length) {
                                letter = pl.word[r - pl.row];
                                isFound = found.includes(pl.word);
                                break;
                            }
                        }
                    }
                    
                    if (letter) {
                        cell.textContent = isFound ? letter.toUpperCase() : '';
                        cell.classList.add('has-letter');
                        if (isFound) cell.classList.add('found');
                    } else {
                        cell.classList.add('empty');
                    }
                    
                    grid.appendChild(cell);
                }
            }
        }
        
        function updateUI() {
            document.getElementById('progress').style.width = (found.length / targets.length * 100) + '%';
            document.getElementById('found').textContent = found.length;
            document.getElementById('score').textContent = score;
        }
        
        // Actions
        function clear() {
            swipe = [];
            document.getElementById('trail').setAttribute('d', '');
            document.getElementById('center').textContent = '-';
            document.querySelectorAll('.letter').forEach(el => el.classList.remove('selected'));
            document.getElementById('current').innerHTML = '';
        }
        
        function shuffle() {
            letters = shuffle([...letters]);
            clear();
            renderWheel();
        }
        
        function submit() {
            const word = swipe.map(i => letters[i]).join('');
            
            if (word.length < 3) {
                show('Min 3!', 'error');
                return;
            }
            if (found.includes(word)) {
                show('Ya usado!', 'error');
                clear();
                return;
            }
            if (!WORDS.has(word)) {
                show('Nope!', 'error');
                clear();
                return;
            }
            
            if (targets.includes(word)) {
                found.push(word);
                score += word.length * 15;
                show('✓', 'success');
                
                if (found.length === targets.length) {
                    setTimeout(() => {
                        show('🎉 Nivel!', 'win');
                        setTimeout(() => { level++; init(); }, 2000);
                    }, 500);
                }
            } else {
                score += word.length * 5;
                show('★', 'bonus');
            }
            
            clear();
            render();
        }
        
        function show(text, cls) {
            const popup = document.getElementById('popup');
            popup.textContent = text;
            popup.className = 'popup ' + (cls || '');
            setTimeout(() => popup.className = 'popup', 1500);
        }
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        init();
    </script>
</body>
</html>
