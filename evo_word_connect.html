<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO Word Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 50%, #16162a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
        }
        
        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ffd700, #ff9500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-stats { display: flex; gap: 16px; }
        .stat { text-align: center; }
        .stat-val { font-size: 0.8rem; font-weight: 700; color: #ffd700; }
        .stat-lbl { font-size: 0.6rem; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        
        .level-banner {
            text-align: center;
            padding: 8px;
            background: linear-gradient(90deg, rgba(255,215,0,0.15), rgba(255,150,0,0.15));
        }
        
        .level-icon { font-size: 24px; }
        .level-name { font-size: 0.8rem; font-weight: 600; color: #ffd700; }
        
        .progress-wrap { padding: 8px 16px; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffd700, #ff9500); transition: width 0.4s ease; }
        
        .crossword {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
        }
        
        .cell {
            width: 28px;
            height: 28px;
            background: linear-gradient(145deg, #2a2a40, #1e1e30);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }
        
        .cell.has-letter { background: rgba(255,255,255,0.1); }
        .cell.found { background: linear-gradient(145deg, #ffd700, #ff9500); color: #1a1a1a; }
        
        .current-word {
            display: flex;
            justify-content: center;
            gap: 3px;
            padding: 8px;
            min-height: 40px;
        }
        
        .curr-char {
            width: 26px;
            height: 34px;
            background: rgba(255,255,255,0.08);
            border-bottom: 2px solid #ffd700;
            border-radius: 6px 6px 4px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #ffd700;
        }
        
        .curr-char.empty { background: transparent; border-bottom-color: rgba(255,255,255,0.15); }
        
        .wheel-area {
            height: 220px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        
        .wheel {
            position: relative;
            width: 200px;
            height: 200px;
        }
        
        .wheel-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a45, #15152a);
            box-shadow: inset 0 8px 32px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.1);
        }
        
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            background: linear-gradient(145deg, #1a1a30, #0f0f20);
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 800;
            color: #ffd700;
            z-index: 10;
        }
        
        .letter {
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #3a3a55, #252540);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 5;
        }
        
        .letter.selected {
            background: linear-gradient(145deg, #ffd700, #ff9500);
            color: #1a1a1a;
            border-color: #ffd700;
        }
        
        .trail-svg { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
        .trail-path { stroke: #ffd700; stroke-width: 4; stroke-linecap: round; fill: none; opacity: 0.7; }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px;
        }
        
        .btn {
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        
        .btn:active { transform: scale(0.95); }
        .btn-shuffle { background: linear-gradient(145deg, #3b82f6, #2563eb); color: #fff; }
        .btn-clear { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-submit { background: linear-gradient(145deg, #ffd700, #ff9500); color: #1a1a1a; min-width: 45px; }
        
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .popup.success { background: linear-gradient(145deg, #ffd700, #ff9500); color: #1a1a1a; }
        .popup.bonus { background: linear-gradient(145deg, #3b82f6, #2563eb); color: #fff; }
        .popup.error { background: #ef4444; color: #fff; }
        .popup.win { background: linear-gradient(145deg, #10b981, #059669); color: #fff; font-size: 1.4rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 EVO</h1>
        <div class="header-stats">
            <div class="stat">
                <div class="stat-val" id="level">1</div>
                <div class="stat-lbl">Nivel</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="score">0</div>
                <div class="stat-lbl">Puntos</div>
            </div>
        </div>
    </div>
    
    <div class="level-banner">
        <div class="level-icon">🎯</div>
        <div class="level-name">Nivel <span id="level-num">1</span> • <span id="found-count">0</span>/<span id="total-count">2</span></div>
    </div>
    
    <div class="progress-wrap">
        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width:0%"></div>
        </div>
    </div>
    
    <div class="crossword">
        <div class="grid" id="grid"></div>
    </div>
    
    <div class="current-word" id="current"></div>
    
    <div class="wheel-area">
        <div class="wheel" id="wheel">
            <div class="wheel-ring"></div>
            <svg class="trail-svg"><path class="trail-path" id="trail"/></svg>
            <div class="wheel-center" id="center">-</div>
        </div>
    </div>
    
    <div class="buttons">
        <button class="btn btn-shuffle" onclick="shuffle()">🔀</button>
        <button class="btn btn-clear" onclick="clear()">🗑️</button>
        <button class="btn btn-submit" onclick="submit()">✓</button>
    </div>
    
    <div class="popup" id="popup"></div>
    
    <script>
        const LEVELS = [
            {l:['A','R','T','E'], t:['ARTE','TEAR']},
            {l:['A','M','O','R'], t:['AMOR','MORA']},
            {l:['A','B','C','O'], t:['CABO','BOCA']},
            {l:['A','C','E','R'], t:['CARA','AREA']},
            {l:['A','D','I','O'], t:['DIA','IDA']},
            {l:['O','S','A','P'], t:['PASO','SAPO']},
            {l:['A','N','O','S'], t:['NOSA','SON']},
            {l:['A','E','L','V'], t:['VALE','LAVE']},
            {l:['E','R','O','S'], t:['SERO','ROSE']},
            {l:['I','R','A','D'], t:['RIDA','IRA']}
        ];
        
        const WORDS = new Set([
            'arte','tear','area','cabe','casa','cobo','echo','hay','mora','omar','rayo','reya','roma','rueda','saco','sed','seda','sido','solo','tema','tiba','tiene','tino','tira','todo','tono','trae','uso','ve','via','vie','voz','yo','amor','cabo','boca','cosa','dia','ida','amor','mar','casa','casa','cosa','vida','noche','dia','amor','agua','aire','alto','ante','arte','avion','bajo','bello','bien','brazo','bueno','cabeza','cada','cafe','calle','calma','calor','cama','camino','campo','cara','carne','carta','cerca','cielo','cinco','clase','color','costa','crema','cruz','cuatro','cuerpo','dicho','dolor','donde','dulce','duro','edad','ella','error','falso','falta','fama','favor','fecha','feliz','feria','fiesta','flor','fondo','forma','fuego','fuente','fuerza','frio','gallo','ganga','gato','genio','gente','gota','gozo','grado','grande','grito','grupo','guapo','hacer','hacia','hasta','hecho','helado','heroe','hijo','hoja','hombre','hora','hotel','huevo','idea','igual','isla','jardin','jefe','joven','juez','jugar','junto','lado','lago','largo','leche','leer','legal','lejos','lengua','leon','letra','libre','libro','linea','lista','lobo','loco','lucha','lugar','luz','madera','madre','mala','malo','mana','mano','mapa','mar','marca','marco','marido','masa','mayor','media','medio','mejor','menos','mente','mesa','metal','metro','miedo','miel','mirar','mismo','moda','modo','mono','monte','moral','morir','mover','mucho','muerte','mujer','mundo','nacer','nada','nadie','nariz','nata','nave','negro','nieve','nivel','noche','nombre','norte','nota','nube','nunca','obra','oceano','ocupa','ola','opera','orden','oro','otro','oveja','padre','pagar','pais','palabra','palma','pan','papel','para','parar','pared','parte','pasar','paso','pasta','paz','pecho','pedir','pena','pensar','pera','perder','perro','pesca','pie','piedra','piel','pierna','pieza','pino','pintor','piso','planta','plata','playa','plaza','pluma','pobre','poco','poder','poeta','polo','poner','portal','precio','prensa','primo','pronto','prueba','pueblo','puerta','pues','punto','quedar','querer','quien','quinto','quitar','rana','raro','rata','rayo','raza','razon','receta','regla','reino','reloj','resto','rey','rico','rima','rincon','rio','ritmo','robar','roca','rojo','romper','ropa','rostro','rubio','rueda','ruido'
        ]);
        
        let level = 0;
        let letters = [];
        let targets = [];
        let found = [];
        let swipe = [];
        let placements = [];
        let score = 0;
        
        function init() {
            const lvl = LEVELS[level % LEVELS.length];
            letters = shuffle([...lvl.l]);
            targets = lvl.t;
            found = [];
            swipe = [];
            
            document.getElementById('level-num').textContent = level + 1;
            document.getElementById('total-count').textContent = targets.length;
            
            render();
        }
        
        function render() {
            renderWheel();
            renderGrid();
            updateUI();
        }
        
        function renderWheel() {
            const w = document.getElementById('wheel');
            w.querySelectorAll('.letter').forEach(el => el.remove());
            
            const cx = 100, r = 70;
            const n = letters.length;
            
            letters.forEach((letter, i) => {
                const angle = (i * 360 / n - 90) * Math.PI / 180;
                const x = cx + r * Math.cos(angle);
                const y = cx + r * Math.sin(angle);
                
                const el = document.createElement('div');
                el.className = 'letter';
                el.textContent = letter;
                el.style.left = (x - 20) + 'px';
                el.style.top = (y - 20) + 'px';
                el.dataset.i = i;
                
                el.ontouchstart = (e) => { e.preventDefault(); startSwipe(i); };
                el.onpointerdown = (e) => { e.preventDefault(); startSwipe(i); };
                
                w.appendChild(el);
            });
            
            w.ontouchmove = onSwipeMove;
            w.onpointermove = onSwipeMove;
            w.ontouchend = onSwipeEnd;
            w.onpointerup = onSwipeEnd;
        }
        
        function startSwipe(i) {
            swipe = [i];
            updateSwipe();
            if (navigator.vibrate) navigator.vibrate(10);
        }
        
        function onSwipeMove(e) {
            if (swipe.length === 0) return;
            
            const touch = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            
            if (el && el.classList.contains('letter')) {
                const i = parseInt(el.dataset.i);
                
                if (i === swipe[swipe.length - 2]) {
                    swipe.pop();
                    updateSwipe();
                } else if (!swipe.includes(i)) {
                    swipe.push(i);
                    updateSwipe();
                    if (navigator.vibrate) navigator.vibrate(5);
                }
            }
        }
        
        function onSwipeEnd() {}
        
        function updateSwipe() {
            const cx = 100, r = 70;
            const n = letters.length;
            
            document.querySelectorAll('.letter').forEach((el, i) => {
                el.classList.toggle('selected', swipe.includes(i));
            });
            
            const word = swipe.map(i => letters[i]).join('');
            document.getElementById('center').textContent = word || '-';
            
            const trail = document.getElementById('trail');
            if (swipe.length < 2) {
                trail.setAttribute('d', '');
            } else {
                let d = '';
                swipe.forEach((idx, i) => {
                    const angle = (idx * 360 / n - 90) * Math.PI / 180;
                    const x = cx + r * Math.cos(angle);
                    const y = cx + r * Math.sin(angle);
                    d += (i === 0 ? 'M' : 'L') + x + ',' + y + ' ';
                });
                trail.setAttribute('d', d);
            }
            
            const cur = document.getElementById('current');
            cur.innerHTML = '';
            const maxLen = Math.max(...targets.map(t => t.length));
            const chars = [...word];
            for (let i = 0; i <= maxLen; i++) {
                const div = document.createElement('div');
                div.className = 'curr-char' + (chars[i] ? '' : ' empty');
                div.textContent = chars[i] || '';
                cur.appendChild(div);
            }
        }
        
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const size = 4;
            const word1 = targets[0] || 'ARTE';
            const word2 = targets[1] || 'TEAR';
            
            placements = [
                { word: word1, col: 1, row: 1, dir: 'h' },
                { word: word2, col: 1, row: 1, dir: 'v' }
            ];
            
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    let letter = null;
                    let isFound = false;
                    
                    for (const pl of placements) {
                        for (let k = 0; k < pl.word.length; k++) {
                            const tc = pl.dir === 'h' ? pl.col + k : pl.col;
                            const tr = pl.dir === 'h' ? pl.row : pl.row + k;
                            if (tr === r && tc === c) {
                                letter = pl.word[k];
                                isFound = found.includes(pl.word);
                                break;
                            }
                        }
                        if (letter) break;
                    }
                    
                    if (letter) {
                        cell.textContent = isFound ? letter.toUpperCase() : '_';
                        cell.classList.add('has-letter');
                        if (isFound) cell.classList.add('found');
                    } else {
                        cell.classList.add('empty');
                    }
                    
                    grid.appendChild(cell);
                }
            }
        }
        
        function updateUI() {
            document.getElementById('progress').style.width = (found.length / targets.length * 100) + '%';
            document.getElementById('found-count').textContent = found.length;
            document.getElementById('level').textContent = level + 1;
            document.getElementById('score').textContent = score;
        }
        
        function clear() {
            swipe = [];
            document.getElementById('trail').setAttribute('d', '');
            document.getElementById('center').textContent = '-';
            document.querySelectorAll('.letter').forEach(el => el.classList.remove('selected'));
            document.getElementById('current').innerHTML = '';
        }
        
        function shuffle() {
            letters = shuffle([...letters]);
            clear();
            renderWheel();
        }
        
        function submit() {
            const word = swipe.map(i => letters[i]).join('');
            const popup = document.getElementById('popup');
            
            if (word.length < 3) {
                show('Min 3 letras!', 'error');
                return;
            }
            if (found.includes(word)) {
                show('Ya usado!', 'error');
                clear();
                return;
            }
            if (!WORDS.has(word)) {
                show('No existe!', 'error');
                clear();
                return;
            }
            
            if (targets.includes(word)) {
                found.push(word);
                score += word.length * 15;
                show('✓', 'success');
                
                if (found.length === targets.length) {
                    setTimeout(() => {
                        show('🎉 NIVEL!', 'win');
                        setTimeout(() => {
                            document.getElementById('total-count').textContent = targets.length;
                            level++;
                            init();
                        }, 2000);
                    }, 500);
                }
            } else {
                score += word.length * 5;
                show('★', 'bonus');
            }
            
            clear();
            render();
        }
        
        function show(text, cls) {
            const popup = document.getElementById('popup');
            popup.textContent = text;
            popup.className = 'popup ' + (cls || '');
            setTimeout(() => popup.className = 'popup', 1500);
        }
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        init();
    </script>
</body>
</html>
