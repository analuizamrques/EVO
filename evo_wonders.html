<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO - Wonders</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --card: #252525;
            --text: #fff;
            --text-dim: #777;
            --gold: #ffc107;
            --gold-dark: #ffb300;
            --green: #4caf50;
            --line: rgba(255, 193, 7, 0.4);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            overflow: hidden;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        header {
            text-align: center;
            margin-bottom: 8px;
        }
        
        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 3px;
        }
        
        .wonder {
            background: var(--surface);
            border-radius: 14px;
            padding: 14px 28px;
            margin-bottom: 10px;
            text-align: center;
            width: 100%;
            max-width: 340px;
        }
        
        .wonder .icon {
            font-size: 36px;
        }
        
        .wonder .name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }
        
        .wonder .country {
            color: var(--text-dim);
            font-size: 0.75rem;
        }
        
        .progress {
            width: 100%;
            max-width: 340px;
            height: 6px;
            background: var(--surface);
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.3s ease;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 340px;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        
        /* Word Grid - Crossword */
        .word-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            max-width: 320px;
            margin-bottom: 16px;
        }
        
        .grid-cell {
            width: 32px;
            height: 32px;
            background: transparent;
            border: 1px dashed var(--card);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        
        .grid-cell.filled {
            background: var(--gold);
            color: var(--bg);
            border-style: solid;
        }
        
        /* Letter Wheel - The key feature */
        .wheel-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin-bottom: 16px;
        }
        
        .wheel-bg {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        .letter {
            position: absolute;
            width: 48px;
            height: 48px;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        
        .letter:active {
            transform: scale(0.92);
        }
        
        .letter.selected {
            background: var(--gold);
            color: var(--bg);
            transform: scale(1.1);
        }
        
        /* Trace line SVG */
        .trace-svg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }
        
        .trace-line {
            stroke: var(--gold);
            stroke-width: 4;
            stroke-linecap: round;
            fill: none;
            stroke-linejoin: round;
        }
        
        /* Buttons */
        .btns {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        
        .btn-clear {
            background: var(--surface);
            color: var(--text);
        }
        
        .btn-submit {
            background: var(--gold);
            color: var(--bg);
        }
        
        /* Found words */
        .found-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            max-width: 320px;
        }
        
        .found-word {
            background: var(--surface);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        
        .found-word.correct {
            background: var(--green);
            color: white;
        }
        
        /* Message */
        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.4rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
        }
        
        #msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #msg.success { background: var(--green); color: white; }
        #msg.error { background: #f44336; color: white; }
        #msg.win { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--bg); font-size: 1.6rem; }
    </style>
</head>
<body>
    <header>
        <h1>🔥 EVO</h1>

    <div class="wonder">
        <div class="icon" id="icon">🗼</div>

lo','suegra','suela','sueño','suerte','suficiente','sufrir','super','suponer','sur','tabla','tacto','talla','talon','tango','tapa','tarde','tarea','tasa','tatuar','taxi','taza','teatro','techo','tela','tema','temer','temor','tender','tener','tenis','tenso','teoria','terco','terminar','terror','tesis','tesoro','tibia','tigre','tijera','tilde','timbal','tino','tinto','tipo','tirar','tirita','titulo','tocar','tomar','tono','toque','torre','torta','total','toxina','traer','tramo','tratar','trauma','trebol','tregua','treint','tren','tres','trigo','triste','triunfo','trivial','trocar','tropa','tropezar','tubo','tumba','tumor','tunel','turno','tutor','ultimo','unico','unir','usar','utensilio','uva','vaca','vacuna','vago','valer','valle','valor','vapor','variable','vara','variar','vario','vaso','vecino','veinte','vela','venas','venir','ventana','verano','verbo','verdad','verde','verso','vestir','vez','viaje','viajero','viejo','viento','vino','violin','virgen','virtud','virus','visita','vista','vivir','vivo','volar','voltaje','volver','vomito','voto','voz','vuelo','yate','yema','yerba','yoga','yunque','zapato','zebra','zona'
        ];
        
        let level = 0;
        let letters = [];
        let targets = [];
        let found = [];
        let selected = [];
        let tracePoints = [];
        let score = 0;
        
        function randLetter() {
            return String.fromCharCode(97 + Math.floor(Math.random() * 26));
        }
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function getWords(letterSet) {
            const dict = {};
            for (let w of WORDS) {
                if (w.length < 3) continue;
                const uniq = [...new Set(w)];
                if (uniq.every(l => letterSet.has(l))) {
                    const key = [...uniq].sort().join('');
                    if (!dict[key] || w.length > dict[key].length) dict[key] = w;
                }
            }
            return Object.values(dict).slice(0, 12);
        }
        
        function init() {
            const w = WONDS[level % WONDS.length];
            document.getElementById('icon').textContent = w.icon;
            document.getElementById('name').textContent = w.name;
            document.getElementById('country').textContent = w.country;
            
            const used = new Set();
            while (used.size < 7) used.add(randLetter());
            letters = shuffle([...used]);
            targets = getWords(new Set(letters));
            
            found = [];
            selected = [];
            
            renderWheel();
            renderGrid();
            renderFound();
        }
        
        function renderWheel() {
            const container = document.getElementById('wheel-container');
            const center = 130;
            const radius = 85;
            
            // Clear old letters
            container.querySelectorAll('.letter').forEach(l => l.remove());
            
            letters.forEach((letter, i) => {
                const angle = (i * 360 / letters.length - 90) * Math.PI / 180;
                const x = center + radius * Math.cos(angle) - 24;
                const y = center + radius * Math.sin(angle) - 24;
                
                const el = document.createElement('div');
                el.className = 'letter';
                el.textContent = letter.toUpperCase();
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.dataset.index = i;
                
                el.addEventListener('mousedown', () => startSelect(i));
                el.addEventListener('touchstart', e => { e.preventDefault(); startSelect(i); });
                
                container.appendChild(el);
            });
            
            // Touch/mouse tracking
            container.addEventListener('mousemove', onMove);
            container.addEventListener('touchmove', onTouchMove);
            container.addEventListener('mouseup', endSelect);
            container.addEventListener('touchend', endSelect);
        }
        
        function startSelect(index) {
            if (!selected.includes(index)) {
                selected.push(index);
                updateSelection();
            }
        }
        
        function onMove(e) {
            if (selected.length === 0) return;
            const el = document.elementFromPoint(e.clientX, e.clientY);
            if (el && el.classList.contains('letter')) {
                const idx = parseInt(el.dataset.index);
                if (!selected.includes(idx)) {
                    selected.push(idx);
                    updateSelection();
                }
            }
        }
        
        function onTouchMove(e) {
            if (selected.length === 0) return;
            e.preventDefault();
            const touch = e.touches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.classList.contains('letter')) {
                const idx = parseInt(el.dataset.index);
                if (!selected.includes(idx)) {
                    selected.push(idx);
                    updateSelection();
                }
            }
        }
        
        function endSelect() {
            if (selected.length > 0) {
                const word = selected.map(i => letters[i]).join('');
                document.getElementById('center').textContent = word.toUpperCase();
            }
        }
        
        function updateSelection() {
            const center = 130;
            const radius = 85;
            
            // Update letter visuals
            document.querySelectorAll('.letter').forEach((el, i) => {
                el.classList.toggle('selected', selected.includes(i));
            });
            
            // Draw trace line
            const trace = document.getElementById('trace');
            if (selected.length < 2) {
                trace.setAttribute('d', '');
                return;
            }
            
            let d = '';
            selected.forEach((idx, i) => {
                const angle = (idx * 360 / letters.length - 90) * Math.PI / 180;
                const x = center + radius * Math.cos(angle);
                const y = center + radius * Math.sin(angle);
                if (i === 0) d = `M ${x} ${y}`;
                else d += ` L ${x} ${y}`;
            });
            trace.setAttribute('d', d);
            
            // Update center
            const word = selected.map(i => letters[i]).join('');
            document.getElementById('center').textContent = word.toUpperCase();
        }
        
        function clearSel() {
            selected = [];
            document.getElementById('trace').setAttribute('d', '');
            document.querySelectorAll('.letter').forEach(l => l.classList.remove('selected'));
            document.getElementById('center').textContent = '-';
        }
        
        function submitWord() {
            const word = selected.map(i => letters[i]).join('');
            const msg = document.getElementById('msg');
            
            if (word.length < 3) {
                show('Mín 3 letras!', 'error');
                return;
            }
            
            if (targets.includes(word) && !found.includes(word)) {
                found.push(word);
                score += word.length * 20;
                show('✓ ' + word.toUpperCase(), 'success');
                
                if (found.length === targets.length) {
                    setTimeout(() => {
                        show('🎉 NIVEL COMPLETO!', 'win');
                        setTimeout(() => { level++; clearSel(); init(); }, 2000);
                    }, 500);
                }
            } else if (found.includes(word)) {
                show('Já encontrado!', 'error');
            } else {
                show('Inválido!', 'error');
            }
            
            clearSel();
            renderFound();
            renderGrid();
        }
        
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            targets.forEach(w => {
                const el = document.createElement('div');
                el.className = 'grid-cell' + (found.includes(w) ? ' filled' : '');
                el.textContent = found.includes(w) ? w.toUpperCase() : '?'.repeat(w.length);
                grid.appendChild(el);
            });
            
            document.getElementById('found').textContent = found.length;
            document.getElementById('total').textContent = targets.length;
            document.getElementById('score').textContent = score;
            
            const pct = targets.length ? (found.length / targets.length) * 100 : 0;
            document.getElementById('progress').style.width = pct + '%';
        }
        
        function renderFound() {
            const list = document.getElementById('found-words');
            list.innerHTML = '';
            targets.slice(0, 8).forEach(w => {
                const el = document.createElement('div');
                el.className = 'found-word' + (found.includes(w) ? ' correct' : '');
                el.textContent = w.toUpperCase();
                list.appendChild(el);
            });
        }
        
        function show(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'show ' + type;
            setTimeout(() => msg.classList.remove('show'), 1500);
        }
        
        init();
    </script>
</body>
</html>
