<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO - Wonders</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --card: #222;
            --text: #fff;
            --text-dim: #666;
            --gold: #ffc107;
            --gold-glow: rgba(255, 193, 7, 0.25);
            --green: #4caf50;
            --blue: #2196f3;
            --purple: #9c27b0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow: hidden;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 360px;
            margin-bottom: 8px;
        }
        
        header h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--gold), #ff9800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        header .stats {
            display: flex;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        
        header .stats strong {
            color: var(--gold);
        }
        
        .location {
            background: var(--surface);
            border: 1px solid var(--card);
            border-radius: 12px;
            padding: 10px 20px;
            margin-bottom: 10px;
            text-align: center;
            width: 100%;
            max-width: 360px;
        }
        
        .location .icon {
            font-size: 28px;
        }
        
        .location .name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--gold);
        }
        
        .location .level {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        
        .progress {
            width: 100%;
            max-width: 360px;
            height: 3px;
            background: var(--surface);
            border-radius: 2px;
            margin-bottom: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--blue));
            transition: width 0.4s ease;
        }
        
        /* Crossword Grid */
        .crossword {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 3px;
            padding: 10px;
            background: var(--surface);
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 320px;
        }
        
        .cw-cell {
            width: 36px;
            height: 36px;
            background: var(--card);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .cw-cell.empty {
            background: transparent;
        }
        
        .cw-cell.found {
            background: var(--green);
            color: white;
            animation: pop 0.3s ease;
        }
        
        .cw-cell.bonus {
            background: var(--blue);
            color: white;
        }
        
        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        
        /* Current Word */
        .current-word {
            display: flex;
            justify-content: center;
            gap: 4px;
            min-height: 42px;
            margin-bottom: 10px;
        }
        
        .curr-letter {
            width: 32px;
            height: 42px;
            background: var(--surface);
            border-bottom: 3px solid var(--gold);
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
        }
        
        .curr-letter.empty {
            background: transparent;
            border-bottom-color: var(--card);
        }
        
        /* Letter Grid for Swipe */
        .letter-wheel {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 10px;
        }
        
        .wheel-bg {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 800;
            color: var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 10;
            text-transform: uppercase;
        }
        
        .letter-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }
        
        .letter-btn:hover {
            background: #333;
            transform: scale(1.08);
        }
        
        .letter-btn:active, .letter-btn.active {
            background: var(--gold);
            color: var(--bg);
            transform: scale(0.95);
        }
        
        .letter-btn.used {
            opacity: 0.2;
            pointer-events: none;
        }
        
        /* Trace Line */
        .trace-svg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }
        
        .trace-line {
            stroke: var(--gold);
            stroke-width: 5;
            stroke-linecap: round;
            fill: none;
            stroke-linejoin: round;
            opacity: 0.7;
        }
        
        /* Buttons */
        .btns {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-clear {
            background: var(--surface);
            color: var(--text);
        }
        
        .btn-submit {
            background: var(--gold);
            color: var(--bg);
            min-width: 80px;
            justify-content: center;
        }
        
        .btn-hint {
            background: var(--purple);
            color: white;
        }
        
        .btn-shuffle {
            background: var(--blue);
            color: white;
        }
        
        /* Word List */
        .word-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 340px;
        }
        
        .word-item {
            background: var(--surface);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        
        .word-item.correct {
            background: var(--green);
            color: white;
        }
        
        .word-item.bonus {
            background: var(--blue);
            color: white;
        }
        
        /* Message */
        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 16px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.3rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
            text-align: center;
        }
        
        #msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #msg.success { background: var(--green); color: white; }
        #msg.bonus { background: var(--blue); color: white; }
        #msg.error { background: #f44336; color: white; }
        #msg.win { background: linear-gradient(135deg, var(--gold), #ff9800); color: var(--bg); font-size: 1.5rem; }
    </style>
</head>

ronco','ropa','rostro','rubia','rubio','rueda','rugido','ruido','rumbo','rural'
        ]);
        
        // ==================== WONDERS DATA ====================
        const WONDERS = [
            {icon:'🗼',name:'Torre Eiffel',place:'Paris'},
            {icon:'🗽',name:'Estátua Liberdade',place:'NYC'},
            {icon:'🕌',name:'Taj Mahal',place:'India'},
            {icon:'🏛️',name:'Partenón',place:'Grecia'},
            {icon:'🗿',name:'Moai',place:'Isla Pascua'},
            {icon:'🏰',name:'Castelo',place:'Francia'},
            {icon:'🕰️',name:'Big Ben',place:'Londres'},
            {icon:'🏜️',name:'Pirámides',place:'Egipto'},
            {icon:'⛩️',name:'Templo',place:'Japón'},
            {icon:'🏟️',name:'Coliseo',place:'Roma'}
        ];
        
        // ==================== GAME STATE ====================
        let level = 0;
        let letters = [];
        let targets = [];
        let bonusWords = [];
        let found = [];
        let bonus = [];
        let currentSwipe = [];
        let hintsUsed = 0;
        let maxHints = 3;
        let score = 0;
        
        // DOM elements
        const centerEl = document.getElementById('center');
        const traceEl = document.getElementById('trace');
        
        // ==================== UTILS ====================
        function randLetter() {
            const vowels = 'aeiou';
            const cons = 'bcdfghjklmnpqrstvwxyz';
            if (Math.random() > 0.4) return vowels[Math.floor(Math.random() * vowels.length)];
            return cons[Math.floor(Math.random() * cons.length)];
        }
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function shuffleObj(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        
        // ==================== LEVEL GENERATOR ====================
        function generateLevel() {
            // Get base word for level
            const baseWords = [...DICTIONARY].filter(w => w.length >= 4 && w.length <= 6);
            const baseWord = baseWords[Math.floor(Math.random() * baseWords.length)];
            
            // Get unique letters
            const uniqueLetters = [...new Set(baseWord)];
            
            // Generate more letters from unique set (7-10 letters)
            const letterSet = new Set(uniqueLetters);
            while (letterSet.size < 8 + Math.floor(level / 5)) {
                letterSet.add(randLetter());
            }
            letters = shuffle([...letterSet]);
            
            // Find all valid words from letters
            const allWords = [...DICTIONARY].filter(w => {
                if (w.length < 3) return false;
                const uniq = [...new Set(w)];
                return uniq.every(l => letterSet.has(l));
            });
            
            // Pick target words (longer words first)
            allWords.sort((a, b) => b.length - a.length);
            targets = allWords.slice(0, 4 + Math.floor(level / 3));
            bonusWords = allWords.slice(4, 12);
            
            // Reset state
            hintsUsed = 0;
        }
        
        // ==================== CROSSWORD BUILDER ====================
        function buildCrossword() {
            const cw = document.getElementById('crossword');
            cw.innerHTML = '';
            
            const rows = 6;
            const cols = 6;
            
            // Place first word in middle
            const firstWord = targets[0] || 'casa';
            const startRow = Math.floor((rows - 1) / 2);
            const startCol = Math.floor((cols - firstWord.length) / 2);
            
            // Create empty grid
            const grid = Array(rows).fill(null).map(() => Array(cols).fill(null));
            
            // Place first word horizontally
            for (let i = 0; i < firstWord.length; i++) {
                if (startCol + i < cols) {
                    grid[startRow][startCol + i] = firstWord[i];
                }
            }
            
            // Place vertical words that share letters
            for (let t = 1; t < targets.length; t++) {
                const word = targets[t];
                // Find a matching letter position
                for (let wc = 0; wc < word.length; wc++) {
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            if (grid[r][c] === word[wc] && r > 0 && r < rows - 1) {
                                // Check space above and below
                                let canPlace = true;
                                if (!grid[r-1]?.[c]) canPlace = false;
                                if (!grid[r+1]?.[c]) canPlace = false;
                                
                                if (canPlace && grid[r-1]?.[c] === null) {
                                    for (let wi = 0; wi < word.length; wi++) {
                                        if (wi !== wc && grid[r-1+wi-r]?.[c] !== null && grid[r-1+wi-r]?.[c] !== word[wi]) {
                                            canPlace = false;
                                            break;
                                        }
                                    }
                                    if (canPlace) {
                                        for (let wi = 0; wi < word.length; wi++) {
                                            if (wi !== wc) {
                                                grid[r - 1 + wi][c] = word[wi];
                                            }
                                        }
                                        break;
                                    }
                                }
                            }
                        }
                    }
                }
            }
            
            // Render grid
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cw-cell';
                    if (grid[r][c]) {
                        cell.textContent = grid[r][c].toUpperCase();
                        const isFound = found.some(w => w.includes(grid[r][c]));
                        if (isFound) cell.classList.add('found');
                    } else {
                        cell.classList.add('empty');
                    }
                    cw.appendChild(cell);
                }
            }
        }
        
        // ==================== RENDER ====================
        function render() {
            // Location
            const w = WONDERS[level % WONDERS.length];
            document.getElementById('icon').textContent = w.icon;
            document.getElementById('name').textContent = w.name;
            document.getElementById('level-hint').textContent = w.place;
            document.getElementById('level-num').textContent = level + 1;
            
            // Progress
            const pct = targets.length ? ((found.length + bonus.length) / (targets.length + bonusWords.length)) * 100 : 0;
            document.getElementById('progress').style.width = pct + '%';
            document.getElementById('score').textContent = score;
            
            // Render letter wheel
            renderWheel();
            
            // Render word list
            renderWordList();
            
            // Build crossword
            buildCrossword();
            
            // Clear current word
            renderCurrentWord();
        }
        
        function renderWheel() {
            const wheel = document.getElementById('wheel');
            const center = 140;
            const radius = 90;
            
            // Remove old buttons
            wheel.querySelectorAll('.letter-btn').forEach(b => b.remove());
            
            letters.forEach((letter, idx) => {
                const angle = (idx * 360 / letters.length - 90) * Math.PI / 180;
                const x = center + radius * Math.cos(angle) - 25;
                const y = center + radius * Math.sin(angle) - 25;
                
                const btn = document.createElement('div');
                btn.className = 'letter-btn';
                btn.textContent = letter.toUpperCase();
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';
                btn.dataset.index = idx;
                
                btn.addEventListener('pointerdown', e => { e.preventDefault(); startSwipe(idx); });
                
                wheel.appendChild(btn);
            });
            
            // Add move listener
            wheel.addEventListener('pointermove', onSwipeMove);
            wheel.addEventListener('pointerup', endSwipe);
        }
        
        function onSwipeMove(e) {
            if (currentSwipe.length === 0) return;
            const btn = document.elementFromPoint(e.clientX, e.clientY);
            if (btn && btn.classList.contains('letter-btn')) {
                const idx = parseInt(btn.dataset.index);
                const lastIdx = currentSwipe[currentSwipe.length - 1];
                
                // Check if adjacent
                if (!currentSwipe.includes(idx) && isAdjacent(lastIdx, idx)) {
                    currentSwipe.push(idx);
                    updateSwipe();
                }
            }
        }
        
        function isAdjacent(a, b) {
            const angleA = (a * 360 / letters.length - 90) * Math.PI / 180;
            const angleB = (b * 360 / letters.length - 90) * Math.PI / 180;
            const dist = Math.abs(a - b);
            return dist === 1 || dist === letters.length - 1;
        }
        
        function startSwipe(idx) {
            currentSwipe = [idx];
            updateSwipe();
        }
        
        function endSwipe() {
            // Done
        }
        
        function updateSwipe() {
            const center = 140;
            const radius = 90;
            
            // Update letter buttons
            document.querySelectorAll('.letter-btn').forEach((btn, i) => {
                btn.classList.toggle('active', currentSwipe.includes(i));
            });
            
            // Update center display
            const word = currentSwipe.map(i => letters[i]).join('');
            centerEl.textContent = word.toUpperCase() || '-';
            
            // Draw trace line
            if (currentSwipe.length < 2) {
                traceEl.setAttribute('d', '');
                return;
            }
            
            let d = '';
            currentSwipe.forEach((idx, i) => {
                const angle = (idx * 360 / letters.length - 90) * Math.PI / 180;
                const x = center + radius * Math.cos(angle);
                const y = center + radius * Math.sin(angle);
                d += (i === 0 ? 'M ' : 'L ') + x + ' ' + y + ' ';
            });
            traceEl.setAttribute('d', d);
            
            // Update current word display
            renderCurrentWord();
        }
        
        function renderCurrentWord() {
            const current = document.getElementById('current');
            current.innerHTML = '';
            const word = currentSwipe.map(i => letters[i]);
            const maxLen = Math.max(...targets.map(t => t.length), 4);
            
            for (let i = 0; i < maxLen + 1; i++) {
                const el = document.createElement('div');
                el.className = 'curr-letter' + (word[i] ? '' : ' empty');
                el.textContent = word[i] ? word[i].toUpperCase() : '';
                current.appendChild(el);
            }
        }
        
        function clearSwipe() {
            currentSwipe = [];
            traceEl.setAttribute('d', '');
            centerEl.textContent = '-';
            document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
            renderCurrentWord();
        }
        
        function shuffleLetters() {
            letters = shuffle(letters);
            renderWheel();
        }
        
        function renderWordList() {
            const list = document.getElementById('words');
            list.innerHTML = '';
            
            // Show targets
            targets.forEach(w => {
                const el = document.createElement('div');
                el.className = 'word-item' + (found.includes(w) ? ' correct' : '');
                el.textContent = w.toUpperCase() + (found.includes(w) ? ' ✓' : '');
                list.appendChild(el);
            });
            
            // Show bonus available
            bonusWords.filter(b => !bonus.includes(b)).forEach(w => {
                if (found.length >= targets.length - 1) {
                    const el = document.createElement('div');
                    el.className = 'word-item';
                    el.textContent = w.toUpperCase() + ' ★';
                    list.appendChild(el);
                }
            });
        }
        
        // ==================== SUBMIT ====================
        function submitWord() {
            const word = currentSwipe.map(i => letters[i]).join('');
            const msg = document.getElementById('msg');
            
            if (word.length < 3) {
                show('Min 3 letras!', 'error');
                return;
            }
            
            // Check dictionary
            if (!DICTIONARY.has(word)) {
                show('No está en diccionario!', 'error');
                clearSwipe();
                return;
            }
            
            // Check if target
            if (targets.includes(word) && !found.includes(word)) {
                found.push(word);
                score += word.length * 20;
                show('✓ ' + word.toUpperCase(), 'success');
                playSound('success');
                
                if (found.length === targets.length) {
                    show('🎉 NIVEL COMPLETO!', 'win');
                    setTimeout(() => {
                        level++;
                        initLevel();
                    }, 2000);
                }
            }
            // Check if bonus
            else if (bonusWords.includes(word) && !bonus.includes(word) && !found.includes(word)) {
                bonus.push(word);
                score += word.length * 10;
                show('★ ' + word.toUpperCase() + ' (bonus)', 'bonus');
            } else if (found.includes(word) || bonus.includes(word)) {
                show('Ya encontrado!', 'error');
            } else {
                show('No es palabra objetivo!', 'error');
            }
            
            clearSwipe();
            render();
        }
        
        function useHint() {
            if (hintsUsed >= maxHints) {
                show('Sin pistas disponibles!', 'error');
                return;
            }
            
            // Find unguessed word
            const target = targets.find(t => !found.includes(t));
            if (!target) return;
            
            // Show one letter
            const letter = target[0];
            const idx = letters.indexOf(letter);
            if (idx >= 0) {
                currentSwipe = [idx];
                updateSwipe();
                hintsUsed++;
                score = Math.max(0, score - 50);
                show('💡 Pista: ' + letter.toUpperCase(), 'success');
            }
        }
        
        function show(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'show ' + type;
            setTimeout(() => msg.classList.remove('show'), 1500);
        }
        
        function playSound(type) {
            // Simple beep using Web Audio API could be added here
            // For now we just use visual feedback
        }
        
        function initLevel() {
            generateLevel();
            render();
        }
        
        // ==================== INIT ====================
        initLevel();
    </script>
</body>
</html>
