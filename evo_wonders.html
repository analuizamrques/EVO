<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO - Wonders</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --card: #2a2a2a;
            --text: #fff;
            --text-dim: #666;
            --gold: #ffc107;
            --gold-glow: rgba(255, 193, 7, 0.3);
            --green: #4caf50;
            --blue: #2196f3;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            overflow: hidden;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        header {
            text-align: center;
            margin-bottom: 10px;
        }
        
        header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 2px;
        }
        
        .location {
            background: var(--surface);
            border-radius: 12px;
            padding: 12px 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .location .icon {
            font-size: 32px;
        }
        
        .location .name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
        }
        
        .location .hint {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        
        .progress {
            width: 100%;
            max-width: 320px;
            height: 4px;
            background: var(--surface);
            border-radius: 2px;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gold);
            transition: width 0.3s ease;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        
        /* Letter Grid - The KEY feature */
        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding: 12px;
            background: var(--surface);
            border-radius: 14px;
            margin-bottom: 14px;
            max-width: 300px;
        }
        
        .cell {
            width: 46px;
            height: 46px;
            background: var(--card);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }
        
        .cell:hover {
            background: #333;
        }
        
        .cell.selected {
            background: var(--gold);
            color: var(--bg);
            transform: scale(1.05);
        }
        
        .cell.found {
            background: var(--green);
            color: white;
        }
        
        .cell.reveal {
            animation: reveal 0.3s ease;
        }
        
        @keyframes reveal {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* Current word display */
        .current-word {
            display: flex;
            justify-content: center;
            gap: 4px;
            min-height: 44px;
            margin-bottom: 14px;
        }
        
        .current-letter {
            width: 36px;
            height: 44px;
            background: var(--surface);
            border-bottom: 3px solid var(--gold);
            border-radius: 6px 6px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
        }
        
        .current-letter.empty {
            background: transparent;
            border-bottom-color: var(--card);
        }
        
        /* Buttons */
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }
        
        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        
        .btn-clear {
            background: var(--surface);
            color: var(--text);
        }
        
        .btn-submit {
            background: var(--gold);
            color: var(--bg);
        }
        
        /* Words to find */
        .words-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 300px;
        }
        
        .word-item {
            background: var(--surface);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        
        .word-item.correct {
            background: var(--green);
            color: white;
        }
        
        /* Message */
        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 18px 36px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.4rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
        }
        
        #msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #msg.success { background: var(--green); color: white; }
        #msg.error { background: #f44336; color: white; }
        #msg.win { background: linear-gradient(135deg, var(--gold), #ff9800); color: var(--bg); font-size: 1.6rem; }
    </style>
</head>
<body>
    <header>
        <h1>🔥 EVO</h1>
    </header>
    
    <div class="location">
        <div class="icon" id="icon">🗼</div>
        <div class="name" id="name">Torre Eiffel</div>
        <div class="hint" id="hint">Nivel 1 • Paris</div>
    </div>
    
    <div class="progress"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    
    <div class="stats">
        <span>Encontradas: <span id="found">0</span>/<span id="total">5</span></span>
        <span>Puntos: <span id="score">0</span></span>
    </div>
    
    <div class="current-word" id="current"></div>
    
    <div id="grid"></div>
    
    <div class="buttons">
        <button class="btn btn-clear" onclick="clearSel()">🗑️</button>
        <button class="btn btn-submit" onclick="submitWord()">✓ OK</button>
    </div>
    
    <div class="words-row" id="words"></div>
    
    <div id="msg"></div>
    
    <script>
        const WONDS = [
            {icon:'🗼',name:'Torre Eiffel',hint:'Paris, Francia'},
            {icon:'🗽',name:'Estátua Liberdade',hint:'Nueva York'},
            {icon:'🕌',name:'Taj Mahal',hint:'India'},
            {icon:'🏛️',name:'Partenón',hint:'Grecia'},
            {icon:'🗿',name:'Moai',hint:'Isla Pascua'},
            {icon:'🏰',name:'Castelo',hint:'Francia'},
            {icon:'🕰️',name:'Big Ben',hint:'Londres'},
            {icon:'🏜️',name:'Pirámides',hint:'Egipto'},
            {icon:'⛩️',name:'Templo',hint:'Japón'},
            {icon:'🏟️',name:'Coliseo',hint:'Roma'}
        ];
        
        const WORDS = [
            'casa','cosa','vida','noche','dia','amor','agua','aire','alto','ante','arbol','arte','avion','bajo','bello','bien','blusa','brazo','bueno','caballo','cabeza','cabo','cada','cafe','calle','calma','calor','cama','camino','campo','canto','cara','carne','carta','caso','caza','cerca','cielo','cinco','clase','color','cosa','costa','crema','cruz','cuarto','cuatro','cuerpo','chico','china','chino','dia','dicho','dolor','donde','dulce','duro','edad','ella','ello','epoca','error','espalda','estar','esto','falso','falta','fama','favor','fecha','feliz','feria','fiesta','figura','firma','flor','fondo','forma','fuego','fuente','fuerza','frio','gallo','gama','ganga','gato','genio','gente','gota','gozo','grado','grande','grito','grupo','guapo','haber','hacer','hacia','hasta','hecho','helado','heroe','hijo','hoja','hombre','hora','hotel','huevo','idea','igual','isla','jardin','jefe','joven','juez','jugar','junto','lado','lago','lana','largo','leche','leer','legal','lejos','lengua','leon','letra','libre','libro','linea','lista','lobo','loco','lucha','lugar','luz','madera','madre','mago','mala','malo','mana','mano','mapa','mar','marca','marco','marido','masa','mayor','media','medio','mejor','menos','mente','mesa','metal','metro','miedo','miel','milla','mirada','mirar','mismo','moda','modo','mono','monte','moral','morir','mover','mucho','muerte','mujer','mundo','nacer','nada','nadie','nariz','nata','nave','negro','nieve','nivel','noche','nombre','norte','nota','nube','nunca','obra','oceano','ocupa','oficial','ojala','ola','opera','orden','oro','otro','oveja','padre','pagar','pais','palabra','palma','pan','panel','papel','para','parar','pared','parte','pasar','paso','pasta','paz','pecho','pedir','pelota','pena','pensar','pera','perder','perro','pesca','pie','piedra','piel','pierna','pieza','pila','pino','pintor','piso','plana','plano','planta','plata','playa','plaza','pluma','pobre','poco','poder','poeta','polo','poner','portal','precio','prensa','primo','probar','pronto','prueba','pueblo','puerta','pues','puesto','punto','puro','quedar','querer','quien','quinto','quitar','rabo','rana','rapido','raro','rasgo','rata','raton','rayo','raza','razon','real','receta','red','regio','regla','reino','relax','rel oj','remar','resto','rey','rico','rima','rincon','rio','ritmo','robar','roca','rodar','rodear','rojo','romper','ropa','rostro','rubio','rueda','ruido','saber','sacar','sal','salir','salud','salvar','samba','sano','santo','seda','seguir','seis','selva','senal','senor','ser','serie','servir','sexto','siglo','signo','silla','simple','sino','sistema','sitio','sobre','social','sol','solar','solo','soltar','sombra','sonar','sonido','sonar','soplar','sordo','sorpresa','subir','suelo','suerte','suficiente','sufrir','super','tabla','tacto','talla','talon','tango','tapa','tarde','tarea','tasa','taxi','taza','teatro','techo','tela','tema','temer','temor','tender','tener','tenis','teoria','terco','terminar','tesoro','tibia','tigre','tipo','tirar','titulo','tocar','tomar','tono','toque','torre','torta','total','traer','tramo','tratar','tren','tres','trigo','triste','triunfo','tubo','tumba','tutor','unico','unir','usar','uva','vaca','vago','valer','valle','valor','vapor','vara','vaso','vecino','veinte','vela','vena','venir','verano','verbo','verdad','verde','verso','vestir','vez','viaje','vida','viejo','viento','vino','virus','visita','vista','vivir','vivo','volar','volver','voz','vuelo','yate','yema','yoga','yunque','zapato','zona'
        ];
        
        let level = 0;
        let gridLetters = [];
        let targets = [];
        let found = [];
        let selected = [];
        let score = 0;
        
        function randLetter() {
            return String.fromCharCode(97 + Math.floor(Math.random() * 26));
        }
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function getWords(letterSet) {
            const dict = {};
            for (let w of WORDS) {
                if (w.length < 3) continue;
                const uniq = [...new Set(w)];
                if (uniq.every(l => letterSet.has(l))) {
                    const key = [...uniq].sort().join('');
                    if (!dict[key] || w.length > dict[key].length) dict[key] = w;
                }
            }
            return Object.values(dict).slice(0, 10);
        }
        
        function init() {
            const w = WONDS[level % WONDS.length];
            document.getElementById('icon').textContent = w.icon;
            document.getElementById('name').textContent = w.name;
            document.getElementById('hint').textContent = 'Nivel ' + (level + 1) + ' • ' + w.hint;
            
            // Generate 25 letters grid
            const used = new Set();
            while (used.size < 12) used.add(randLetter());
            const letters = shuffle([...used]);
            gridLetters = letters.slice(0, 25);
            targets = getWords(new Set(letters)).slice(0, 6);
            
            found = [];
            selected = [];
            
            renderGrid();
            renderCurrent();
            renderWords();
        }
        
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            gridLetters.forEach((letter, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = letter.toUpperCase();
                cell.dataset.index = i;
                
                cell.addEventListener('pointerdown', e => {
                    e.preventDefault();
                    startSelect(i);
                });
                
                grid.appendChild(cell);
            });
            
            document.addEventListener('pointermove', onMove);
            document.addEventListener('pointerup', endSelect);
        }
        
        function onMove(e) {
            if (selected.length === 0) return;
            const el = document.elementFromPoint(e.clientX, e.clientY);
            if (el && el.classList.contains('cell')) {
                const idx = parseInt(el.dataset.index);
                if (!selected.includes(idx)) {
                    // Check if adjacent
                    if (selected.length === 0 || isAdjacent(selected[selected.length - 1], idx)) {
                        selected.push(idx);
                        updateSelection();
                    }
                }
            }
        }
        
        function isAdjacent(a, b) {
            const rowA = Math.floor(a / 5), colA = a % 5;
            const rowB = Math.floor(b / 5), colB = b % 5;
            return Math.abs(rowA - rowB) <= 1 && Math.abs(colA - colB) <= 1;
        }
        
        function startSelect(index) {
            if (!selected.includes(index)) {
                selected.push(index);
                updateSelection();
            }
        }
        
        function endSelect() {
            // Done selecting
        }
        
        function updateSelection() {
            document.querySelectorAll('.cell').forEach((cell, i) => {
                cell.classList.toggle('selected', selected.includes(i));
            });
            
            const current = document.getElementById('current');
            current.innerHTML = '';
            const word = selected.map(i => gridLetters[i]);
            
            const maxLen = Math.max(...targets.map(t => t.length));
            for (let i = 0; i < maxLen + 1; i++) {
                const el = document.createElement('div');
                el.className = 'current-letter' + (word[i] ? '' : ' empty');
                el.textContent = word[i] ? word[i].toUpperCase() : '';
                current.appendChild(el);
            }
        }
        
        function clearSel() {
            selected = [];
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
            renderCurrent();
        }
        
        function renderCurrent() {
            const current = document.getElementById('current');
            current.innerHTML = '';
            const maxLen = targets.length ? Math.max(...targets.map(t => t.length)) : 4;
            for (let i = 0; i < maxLen + 1; i++) {
                const el = document.createElement('div');
                el.className = 'current-letter empty';
                current.appendChild(el);
            }
        }
        
        function submitWord() {
            const word = selected.map(i => gridLetters[i]).join('');
            const msg = document.getElementById('msg');
            
            if (word.length < 3) {
                show('Mín 3 letras!', 'error');
                return;
            }
            
            if (targets.includes(word) && !found.includes(word)) {
                found.push(word);
                score += word.length * 25;
                show('✓ ' + word.toUpperCase(), 'success');
                
                selected.forEach(i => {
                    document.querySelectorAll('.cell')[i].classList.add('found');
                });
                
                if (found.length === targets.length) {
                    setTimeout(() => {
                        show('🎉 NIVEL COMPLETO!', 'win');
                        setTimeout(() => {
                            level++;
                            clearSel();
                            init();
                        }, 2000);
                    }, 500);
                }
            } else if (found.includes(word)) {
                show('Já encontrado!', 'error');
            } else {
                show('Inválido!', 'error');
            }
            
            clearSel();
            renderWords();
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('found').textContent = found.length;
            document.getElementById('total').textContent = targets.length;
            document.getElementById('score').textContent = score;
            
            const pct = targets.length ? (found.length / targets.length) * 100 : 0;
            document.getElementById('progress').style.width = pct + '%';
        }
        
        function renderWords() {
            const words = document.getElementById('words');
            words.innerHTML = '';
            targets.forEach(w => {
                const el = document.createElement('div');
                el.className = 'word-item' + (found.includes(w) ? ' correct' : '');
                el.textContent = w.toUpperCase();
                words.appendChild(el);
            });
            updateStats();
        }
        
        function show(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'show ' + type;
            setTimeout(() => msg.classList.remove('show'), 1500);
        }
        
        init();
    </script>
</body>
</html>
