<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO - Wonders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --gold: #f0b429;
            --gold-dim: #b8962e;
            --gold-glow: rgba(240, 180, 41, 0.3);
            --green: #3fb950;
            --pink: #f778ba;
            --blue: #58a6ff;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            touch-action: manipulation;
        }
        
        /* Header */
        header {
            width: 100%;
            text-align: center;
            margin-bottom: 16px;
        }
        
        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Wonder Card */
        .wonder-card {
            background: var(--surface);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
            width: 100%;
            max-width: 320px;
        }
        
        .wonder-card .emoji {
            font-size: 40px;
            line-height: 1;
        }
        
        .wonder-card .name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold);
            margin-top: 4px;
        }
        
        .wonder-card .hint {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 320px;
        }
        
        .stat {
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 13px;
            flex: 1;
            text-align: center;
        }
        
        .stat strong {
            color: var(--gold);
            display: block;
            font-size: 16px;
        }
        
        /* Answer Slots */
        .answer-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
            min-height: 48px;
            max-width: 300px;
        }
        
        .slot {
            width: 44px;
            height: 44px;
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .slot.filled {
            border-style: solid;
            border-color: var(--gold);
            background: rgba(240, 180, 41, 0.15);
            animation: popIn 0.2s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        /* Letters */
        .letters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 320px;
            margin-bottom: 20px;
        }
        
        .letter {
            width: 44px;
            height: 44px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }
        
        .letter:hover {
            border-color: var(--gold);
            transform: scale(1.08);
        }
        
        .letter:active, .letter.pressed {
            transform: scale(0.95);
            background: var(--gold);
            color: var(--bg);
        }
        
        .letter.used {
            opacity: 0.25;
            pointer-events: none;
            transform: none;
        }
        
        .letter.correct {
            background: var(--green);
            border-color: var(--green);
            color: var(--bg);
            animation: bounce 0.4s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* Found Words */
        .found-words {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 320px;
        }
        
        .found-word {
            background: var(--surface);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid var(--border);
        }
        
        .found-word.correct {
            background: var(--green);
            color: var(--bg);
            border-color: var(--green);
            font-weight: 600;
        }
        
        /* Buttons */
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .btn {
            background: var(--gold);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn.secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        /* Message */
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 18px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }
        
        #message.show {
            opacity: 1;
        }
        
        #message.success {
            background: var(--green);
            color: var(--bg);
        }
        
        #message.error {
            background: #f85149;
            color: white;
        }
        
        #message.win {
            background: linear-gradient(135deg, var(--gold), var(--pink));
            color: var(--bg);
            font-size: 24px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🔥 EVO - Wonders</h1>
    </header>
    
    <div class="wonder-card">
        <div class="emoji" id="wonder-emoji">🗼</div>
        <div class="name" id="wonder-name">Torre Eiffel</div>
        <div class="hint">Nivel <span id="level-num">1</span></div>
    </div>
    
    <div class="stats">
        <div class="stat">
            <span id="found-count">0</span>/<span id="total-count">5</span>

        </div>
        <div class="stat">

    </div>

    <div class="buttons">
        <button class="btn secondary" onclick="hint()">💡 Pista</button>
        <button class="btn" onclick="submit()">✓ Listo</button>
        <button class="btn secondary" onclick="nextLevel()">➡️</button>

        const WONDERS = [
            { emoji: '🗼', name: 'Torre Eiffel', country: 'Paris' },
            { emoji: '🗽', name: 'Estátua Liberdade', country: 'NYC' },
            { emoji: '🕌', name: 'Taj Mahal', country: 'India' },
            { emoji: '🏛️', name: 'Partenon', country: 'Grecia' },
            { emoji: '🗿', name: 'Moai', country: 'Pascoa' },
            { emoji: '🏰', name: 'Castelo', country: 'Franca' },
            { emoji: '🗿', name: 'Big Ben', country: 'Londres' },
            { emoji: '🏜️', name: 'Piramides', country: 'Egito' },
            { emoji: '⛩️', name: 'Templo', country: 'Japao' },
            { emoji: '🏟️', name: 'Coliseu', country: 'Roma' }
        ];
        
        let level = 0;
        let letters = [];
        let targets = [];
        let found = [];
        let current = '';
        let score = 0;
        
        function getWords(letterSet) {
            const dict = {};
            const setStr = [...letterSet].sort().join('');
            
            for (let word of WORDS) {
                if (word.length < 3) continue;
                const wSet = [...new Set([...word])].sort().join('');
                if ([...wSet].every(l => letterSet.includes(l)) && word.length >= 3) {
                    if (!dict[wSet] || word.length > dict[wSet].length) {
                        dict[wSet] = word;
                    }
                }
            }
            return Object.values(dict);
        }
        
        function randItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function init() {
            const w = WONDERS[level % WONDERS.length];
            document.getElementById('wonder-emoji').textContent = w.emoji;
            document.getElementById('wonder-name').textContent = w.name;
            document.getElementById('level-num').textContent = level + 1;
            
            // Generate random letters
            const used = new Set();
            while (used.size < 7) {
                used.add(randItem(WORDS)[0]);
            }
            letters = shuffle([...used]);
            targets = getWords(new Set(letters)).slice(0, 6);
            
            found = [];
            current = '';
            
            render();
        }
        
        function render() {
            const slots = document.getElementById('answer-slots');
            slots.innerHTML = '';
            const len = targets[found.length]?.length || 4;
            
            for (let i = 0; i < 6; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot' + (current[i] ? ' filled' : '');
                slot.textContent = current[i] || '';
                slot.onclick = () => rem(i);
                slots.appendChild(slot);
            }
            
            const container = document.getElementById('letters');
            container.innerHTML = '';
            letters.forEach((letter, i) => {
                const btn = document.createElement('div');
                btn.className = 'letter';
                btn.textContent = letter.toUpperCase();
                btn.onclick = () => add(i);
                container.appendChild(btn);
            });
            
            const fw = document.getElementById('found-words');
            fw.innerHTML = '';
            targets.forEach(word => {
                const el = document.createElement('div');
                el.className = 'found-word' + (found.includes(word) ? ' correct' : '');
                el.textContent = word.toUpperCase();
                fw.appendChild(el);
            });
            
            document.getElementById('total-count').textContent = targets.length;
            document.getElementById('found-count').textContent = found.length;
            document.getElementById('points').textContent = score;
        }
        
        function add(index) {
            current += letters[index];
            document.querySelectorAll('.letter')[index].classList.add('used');
            render();
        }
        
        function rem(index) {
            if (index < current.length) {
                const letter = current[index];
                current = current.slice(0, index) + current.slice(index + 1);
                
                // Free letter
                const btns = document.querySelectorAll('.letter');
                for (let i = 0; i < letters.length; i++) {
                    if (letters[i] === letter && btns[i].classList.contains('used')) {
                        const usedCount = current.split(letter).length - 1;
                        const allCount = letters.join('').split(letter).length - 1;
                        if (usedCount < allCount) {
                            btns[i].classList.remove('used');
                            break;
                        }
                    }
                }
                render();
            }
        }
        
        function submit() {
            const msg = document.getElementById('message');
            
            if (current.length < 3) {
                showMsg('Minimo 3 letras', 'error');
                return;
            }
            
            if (targets.includes(current) && !found.includes(current)) {
                found.push(current);
                score += current.length * 10;
                showMsg(`✅ ${current.toUpperCase()}!`, 'success');
                
                if (found.length === targets.length) {
                    showMsg('🎉 NIVEL COMPLETO!', 'win');
                }
            } else {
                showMsg('❌ Intenta de nuevo', 'error');
            }
            
            // Reset
            document.querySelectorAll('.letter').forEach(l => l.classList.remove('used'));
            current = '';
            render();
            
            // Animate correct letters
            const btns = document.querySelectorAll('.letter');
            [...current].forEach(l => {
                for (let i = 0; i < letters.length; i++) {
                    if (letters[i] === l) btns[i].classList.add('correct');
                }
            });
        }
        
        function showMsg(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'show ' + type;
            setTimeout(() => msg.classList.remove('show'), 1500);
        }
        
        function hint() {
            if (targets[found.length]) {
                const word = targets[found.length];
                const btns = document.querySelectorAll('.letter');
                
                [...word].forEach(l => {
                    for (let i = 0; i < letters.length; i++) {
                        if (letters[i] === l && !btns[i].classList.contains('correct')) {
                            btns[i].classList.add('correct');
                            break;
                        }
                    }
                });
            }
        }
        
        function nextLevel() {
            level++;
            init();
        }
        
        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') submit();
            if (e.key === 'Backspace') current = current.slice(0, -1);
        });
        
        init();
    </script>
</body>
</html>
