<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO - Wonders</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --card: #1f1f1f;
            --text: #fff;
            --text-dim: #555;
            --gold: #ffc107;
            --gold-dark: #ff9800;
            --green: #4caf50;
            --blue: #2196f3;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            -webkit-user-select: none;
            touch-action: none;
            overflow: hidden;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 360px;
            margin-bottom: 6px;
        }
        
        header h1 { font-size: 1.1rem; font-weight: 800; color: var(--gold); }
        header .info { font-size: 0.8rem; color: var(--text-dim); }
        header .info strong { color: var(--gold); }
        
        .location {
            background: var(--surface);
            border-radius: 10px;
            padding: 8px 16px;
            margin-bottom: 8px;
            text-align: center;
            width: 100%;
            max-width: 360px;
        }
        
        .location .icon { font-size: 24px; }
        .location .name { font-size: 0.9rem; font-weight: 700; color: var(--gold); }
        
        .progress {
            width: 100%;
            max-width: 360px;
            height: 3px;
            background: var(--surface);
            border-radius: 2px;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--blue));
            transition: width 0.3s ease;
        }
        
        .crossword {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 3px;
            padding: 8px;
            background: var(--surface);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        
        .cw-cell {
            width: 32px;
            height: 32px;
            background: var(--card);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .cw-cell.empty { background: transparent; }
        
        .cw-cell.found {
            background: var(--green);
            color: white;
            animation: pop 0.3s ease;
        }
        
        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        
        .current {
            display: flex;
            justify-content: center;
            gap: 3px;
            min-height: 36px;
            margin-bottom: 8px;
        }
        
        .curr-letter {
            width: 28px;
            height: 36px;
            background: var(--surface);
            border-bottom: 2px solid var(--gold);
            border-radius: 4px 4px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
        }
        
        .curr-letter.empty {
            background: transparent;
            border-bottom-color: var(--card);
        }
        
        .wheel {
            position: relative;
            width: 260px;
            height: 260px;
            margin-bottom: 8px;
        }
        
        .wheel-bg {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: inset 0 3px 15px rgba(0,0,0,0.4);
        }
        
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: var(--gold);
            box-shadow: 0 3px 12px rgba(0,0,0,0.4);
            z-index: 10;
        }
        
        .letter {
            position: absolute;
            width: 46px;
            height: 46px;
            background: var(--card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.08s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .letter:active, .letter.active {
            background: var(--gold);
            color: var(--bg);
            transform: scale(0.92);
        }
        
        .trace {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }
        
        .trace-line {
            stroke: var(--gold);
            stroke-width: 4;
            stroke-linecap: round;
            fill: none;
            opacity: 0.6;
        }
        
        .btns {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        
        .btn-clear { background: var(--surface); color: var(--text); }
        .btn-submit { background: var(--gold); color: var(--bg); }
        .btn-shuffle { background: var(--blue); color: white; }
        
        .words {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            max-width: 320px;
        }
        
        .word {
            background: var(--surface);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        
        .word.correct { background: var(--green); color: white; }
        
        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.2rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
        }
        
        #msg.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #msg.success { background: var(--green); color: white; }
        #msg.error { background: #f44336; color: white; }
        #msg.win { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--bg); font-size: 1.4rem; }
    </style>
</head>
<body>
    <header>
        <h1>🔥 EVO</h1>
        <div class="info">
            <span>Nivel <strong id="level">1</strong></span>
            <span> | </span>
            <span>Pts <strong id="score">0</strong></span>
        </div>
    </header>
    
    <div class="location">
        <div class="icon" id="icon">🗼</div>
        <div class="name" id="name">Torre Eiffel</div>
    </div>
    
    <div class="progress"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    
    <div class="crossword" id="crossword"></div>
    <div class="current" id="current"></div>
    
    <div class="wheel" id="wheel">
        <div class="wheel-bg"></div>
        <svg class="trace"><path class="trace-line" id="trace" d=""/></svg>
        <div class="wheel-center" id="center">-</div>
    </div>
    
    <div class="btns">
        <button class="btn btn-shuffle" onclick="shuffle()">🔀</button>
        <button class="btn btn-clear" onclick="clear()">🗑️</button>
        <button class="btn btn-submit" onclick="submit()">✓ OK</button>
    </div>
    
    <div class="words" id="words"></div>
    <div id="msg"></div>
    
    <script>
        const WONDS = [
            {icon:'🗼',name:'Torre Eiffel'},
            {icon:'🗽',name:'Estátua Liberdade'},
            {icon:'🕌',name:'Taj Mahal'},
            {icon:'🏛️',name:'Partenón'},
            {icon:'🗿',name:'Moai'},
            {icon:'🏰',name:'Castelo'},
            {icon:'🕰️',name:'Big Ben'},
            {icon:'🏜️',name:'Pirámides'},
            {icon:'⛩️',name:'Templo'},
            {icon:'🏟️',name:'Coliseo'}
        ];
        
        // Pre-defined levels with letters and target words
        const LEVELS = [
            {letters: ['A','R','T','E'], targets: ['AR','ARTE','TEAR','TER']},
            {letters: ['A','B','C','O'], targets: ['CAB','CABA','BOCA','CACO']},
            {letters: ['A','M','O','R'], targets: ['AMOR','MORA','ROMA','MAR']},
            {letters: ['A','C','E','R'], targets: ['CARA','AREA','CARA','CREA']},
            {letters: ['A','D','I','O'], targets: ['ADI','ADIO','OID','DIA']},
            {letters: ['O','S','A','P'], targets: ['PASO','SAPO','POSA','OPAS']},
            {letters: ['A','N','O','S'], targets: ['NOS','SON','ONS','SAN']},
            {letters: ['A','E','L','V'], targets: ['VALE','LAVE','VELA','ALE']},
            {letters: ['E','R','O','S'], targets: ['SERO','RESO','ROSE','EROS']},
            {letters: ['I','R','A','D'], targets: ['RIDA','IRA','RADI','ARID']}
        ];
        
        // Extended dictionary for validation
        const DICT = new Set([
            'casa','cosa','vida','noche','dia','amor','agua','aire','alto','ante','arbol','arte','avion','bajo','bello','bien','blusa','brazo','bueno','caballo','cabeza','cabo','cada','cafe','calle','calma','calor','cama','camino','campo','canto','cara','carne','carta','caso','caza','cerca','cielo','cinco','clase','color','cosa','costa','crema','cruz','cuarto','cuatro','cuerpo','dia','dicho','dolor','donde','dulce','duro','edad','ella','ello','epoca','error','espalda','estar','esto','falso','falta','fama','favor','fecha','feliz','feria','fiesta','figura','firma','flor','fondo','forma','fuego','fuente','fuerza','frio','gallo','gama','ganga','gato','genio','gente','gota','gozo','grado','grande','grito','grupo','guapo','haber','hacer','hacia','hasta','hecho','helado','heroe','hijo','hoja','hombre','hora','hotel','huevo','idea','igual','isla','jardin','jefe','joven','juez','jugar','junto','lado','lago','lana','largo','leche','leer','legal','lejos','lengua','leon','letra','libre','libro','linea','lista','lobo','loco','lucha','lugar','luz','madera','madre','mago','mala','malo','mana','mano','mapa','mar','marca','marco','marido','masa','mayor','media','medio','mejor','menos','mente','mesa','metal','metro','miedo','miel','milla','mirada','mirar','mismo','moda','modo','mono','monte','moral','morir','mover','mucho','muerte','mujer','mundo','nacer','nada','nadie','nariz','nata','nave','negro','nieve','nivel','noche','nombre','norte','nota','nube','nunca','obra','oceano','ocupa','oficial','ojala','ola','opera','orden','oro','otro','oveja','padre','pagar','pais','palabra','palma','pan','panel','papel','para','parar','pared','parte','pasar','paso','pasta','paz','pecho','pedir','pelota','pena','pensar','pera','perder','perro','pesca','pie','piedra','piel','pierna','pieza','pila','pino','pintor','piso','plana','plano','planta','plata','playa','plaza','pluma','pobre','poco','poder','poeta','polo','poner','portal','precio','prensa','primo','probar','pronto','prueba','pueblo','puerta','pues','puesto','punto','puro','quedar','querer','quien','quinto','quitar','rabo','rana','rapido','raro','rasgo','rata','raton','rayo','raza','razon','real','receta','red','regio','regla','reino','relax','reloj','remar','resto','rey','rico','rima','rincon','rio','ritmo','robar','roca','rodar','rodear','rojo','romper','ropa','rostro','rubio','rueda','ruido','saber','sacar','sal','salir','salud','salvar','samba','sano','santo','seda','seguir','seis','selva','senal','senor','ser','serie','servir','sexto','siglo','signo','silla','simple','sino','sistema','sitio','sobre','social','sol','solar','solo','soltar','sombra','sonar','sonido','soplar','sordo','sorpresa','subir','suelo','suerte','suficiente','sufrir','super','tabla','tacto','talla','talon','tango','tapa','tarde','tarea','tasa','taxi','taza','teatro','techo','tela','tema','temer','temor','tender','tener','tenis','teoria','terco','terminar','tesoro','tibia','tigre','tipo','tirar','titulo','tocar','tomar','tono','toque','torre','torta','total','traer','tramo','tratar','tren','tres','trigo','triste','triunfo','tubo','tumba','tutor','unico','unir','usar','uva','vaca','vago','valer','valle','valor','vapor','vara','vaso','vecino','veinte','vela','vena','venir','verano','verbo','verdad','verde','verso','vestir','vez','viaje','vida','viejo','viento','vino','virus','visita','vista','vivir','vivo','volar','volver','voz','vuelo','yate','yema','yoga','yunque','zapato','zona',
            'arte','tear','area','tarea','cabe','coco','casa','caso','cosa','echo','esto','este','esto','hay','lee','ojo','ojo','rayo','raya','rey','reya','rueda','ruego','saco','sed','seda','sido','sube','taco','tema','tibia','tiene','tino','tira','toen','todo','tono','trae','traes','tre','trecho','tri','trip','tubo','uso','vaya','ve','vez','via','vie','vio','voz','vuel','ya','ye','yo'
        ]);
        
        let level = 0;
        let letters = [];
        let targets = [];
        let found = [];
        let swipe = [];
        let score = 0;
        
        function init() {
            const lvl = LEVELS[level % LEVELS.length];
            letters = shuffle([...lvl.letters]);
            targets = lvl.targets;
            found = [];
            swipe = [];
            
            document.getElementById('icon').textContent = WONDS[level % WONDS.length].icon;
            document.getElementById('name').textContent = WONDS[level % WONDS.length].name;
            document.getElementById('level').textContent = level + 1;
            
            render();
        }
        
        function renderWheel() {
            const wheel = document.getElementById('wheel');
            wheel.querySelectorAll('.letter').forEach(l => l.remove());
            
            const center = 130;
            const radius = 85;
            
            letters.forEach((letter, i) => {
                const angle = (i * 360 / letters.length - 90) * Math.PI / 180;
                const x = center + radius * Math.cos(angle) - 23;
                const y = center + radius * Math.sin(angle) - 23;
                
                const el = document.createElement('div');
                el.className = 'letter';
                el.textContent = letter;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.dataset.index = i;
                el.addEventListener('pointerdown', e => { e.preventDefault(); start(i); });
                wheel.appendChild(el);
            });
            
            wheel.addEventListener('pointermove', move);
            wheel.addEventListener('pointerup', end);
        }
        
        function isAdjacent(a, b) {
            const diff = Math.abs(a - b);
            return diff === 1 || diff === letters.length - 1;
        }
        
        function start(i) {
            swipe = [i];
            update();
        }
        
        function move(e) {
            if (swipe.length === 0) return;
            const el = document.elementFromPoint(e.clientX, e.clientY);
            if (el && el.classList.contains('letter')) {
                const i = parseInt(el.dataset.index);
                // Can't reuse same letter
                if (swipe.includes(i)) return;
                // Must be adjacent in wheel
                const last = swipe[swipe.length - 1];
                if (!isAdjacent(last, i)) return;
                    swipe.push(i);
                    update();
                }
            }
        }
        
        function end() {}
        
        function update() {
            const center = 130;
            const radius = 85;
            
            document.querySelectorAll('.letter').forEach((el, i) => {
                el.classList.toggle('active', swipe.includes(i));
            });
            
            const word = swipe.map(i => letters[i]).join('');
            document.getElementById('center').textContent = word || '-';
            
            // Draw line
            if (swipe.length < 2) {
                document.getElementById('trace').setAttribute('d', '');
                return;
            }
            let d = '';
            swipe.forEach((idx, i) => {
                const angle = (idx * 360 / letters.length - 90) * Math.PI / 180;
                const x = center + radius * Math.cos(angle);
                const y = center + radius * Math.sin(angle);
                d += (i === 0 ? 'M ' : 'L ') + x + ' ' + y + ' ';
            });
            document.getElementById('trace').setAttribute('d', d);
            
            // Update current display
            const cur = document.getElementById('current');
            cur.innerHTML = '';
            const maxLen = Math.max(...targets.map(t => t.length));
            const display = [...word];
            for (let i = 0; i < maxLen + 1; i++) {
                const el = document.createElement('div');
                el.className = 'curr-letter' + (display[i] ? '' : ' empty');
                el.textContent = display[i] || '';
                cur.appendChild(el);
            }
        }
        
        function clear() {
            swipe = [];
            document.getElementById('trace').setAttribute('d', '');
            document.getElementById('center').textContent = '-';
            document.querySelectorAll('.letter').forEach(l => l.classList.remove('active'));
            document.getElementById('current').innerHTML = '';
        }
        
        function shuffle() {
            letters = shuffle([...letters]);
            renderWheel();
        }
        
        function submit() {
            const word = swipe.map(i => letters[i]).join('');
            const msg = document.getElementById('msg');
            
            if (word.length < 2) return;
            
            if (targets.includes(word) && !found.includes(word)) {
                found.push(word);
                score += word.length * 10;
                show('✓ ' + word, 'success');
                
                if (found.length === targets.length) {
                    setTimeout(() => {
                        show('🎉 NIVEL COMPLETO!', 'win');
                        setTimeout(() => {
                            level++;
                            init();
                        }, 2000);
                    }, 500);
                }
            } else if (found.includes(word)) {
                show('Ya encontrado!', 'error');
            } else if (DICT.has(word)) {
                score += word.length * 5;
                show('★ ' + word + ' (bonus)', 'success');
            } else {
                show('No válida!', 'error');
            }
            
            clear();
            render();
        }
        
        function render() {
            renderWheel();
            
            // Word list
            const words = document.getElementById('words');
            words.innerHTML = '';
            targets.forEach(w => {
                const el = document.createElement('div');
                el.className = 'word' + (found.includes(w) ? ' correct' : '');
                el.textContent = found.includes(w) ? w : '_'.repeat(w.length);
                words.appendChild(el);
            });
            
            // Progress
            const pct = (found.length / targets.length) * 100;
            document.getElementById('progress').style.width = pct + '%';
            document.getElementById('score').textContent = score;
            
            // Crossword (simple)
            const cw = document.getElementById('crossword');
            cw.innerHTML = '';
            const gridSize = 6;
            const grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(null));
            targets.forEach((w, wi) => {
                const row = Math.floor(wi * 1.5) + 1;
                const col = 1;
                for (let i = 0; i < w.length; i++) {
                    if (col + i < gridSize) grid[row][col + i] = { letter: w[i], found: found.includes(w) };
                }
            });
            
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cw-cell' + (grid[r][c] ? '' : ' empty');
                    if (grid[r][c]) {
                        cell.textContent = grid[r][c].letter.toUpperCase();
                        if (grid[r][c].found) cell.classList.add('found');
                    }
                    cw.appendChild(cell);
                }
            }
        }
        
        function show(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'show ' + type;
            setTimeout(() => msg.classList.remove('show'), 1500);
        }
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        init();
    </script>
</body>
</html>
