<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO - Wonders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --card: #2a2a2a;
            --text: #ffffff;
            --text-dim: #888888;
            --gold: #ffc107;
            --gold-dark: #ffb300;
            --green: #4caf50;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* Header */
        header {
            text-align: center;
            margin-bottom: 16px;
        }
        
        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 2px;
        }
        
        header .level {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 4px;
        }
        
        /* Wonder Card */
        .wonder {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px 32px;
            margin-bottom: 16px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .wonder .icon {
            font-size: 48px;
            line-height: 1.1;
        }
        
        .wonder .name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
            margin-top: 8px;
        }
        
        .wonder .country {
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 4px;
        }
        
        /* Progress */
        .progress-container {
            width: 100%;
            max-width: 340px;
            margin-bottom: 16px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--surface);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
            border-radius: 4px;
            transition: width 0.4s ease;
            width: 0%;
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        
        /* Answer Row */
        .answer-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            min-height: 52px;
            margin-bottom: 20px;
        }
        
        .letter-slot {
            width: 44px;
            height: 52px;
            background: var(--surface);
            border: 2px solid var(--card);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }
        
        .letter-slot.filled {
            border-color: var(--gold);
            animation: popIn 0.15s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        
        /* Letter Wheel */
        .letter-wheel {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 320px;
            margin-bottom: 24px;
        }
        
        .wheel-letter {
            width: 52px;
            height: 52px;
            background: var(--card);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }
        
        .wheel-letter:active {
            transform: scale(0.92);
            background: var(--gold);
            color: var(--bg);
        }
        
        .wheel-letter.used {
            opacity: 0.15;
            transform: scale(1);
        }
        
        .wheel-letter.correct {
            background: var(--green);
            color: white;
        }
        
        /* Buttons */
        .buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
        }
        
        .btn-clear {
            background: var(--surface);
            color: var(--text);
        }
        
        .btn-submit {
            background: var(--gold);
            color: var(--bg);
            min-width: 100px;
        }
        
        .btn-submit:hover {
            background: var(--gold-dark);
        }
        
        /* Word List */
        .word-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 320px;
        }
        
        .word-item {
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 2px;
        }
        
        .word-item.found {
            background: var(--green);
            color: white;
        }
        
        .word-item.hidden {
            background: transparent;
            border: 1px dashed var(--card);
        }
        
        /* Message */
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 20px 40px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
        }
        
        #message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        #message.success {
            background: var(--green);
            color: white;
        }
        
        #message.error {
            background: #f44336;
            color: white;
        }
        
        #message.win {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--bg);
        }
    </style>
</head>

            'temor', 'tender', 'tener', 'tenis', 'tenso', 'teoria', 'terco',
            'terminar', 'terror', 'tesis', 'tesoro', 'tibia', 'tigre', 'tijera',
            'tilde', 'timbal', 'tino', 'tinto', 'tipo', 'tirar', 'tirita',
            'titulo', 'tocar', 'tomar', 'tono', 'toque', 'torre', 'torta',
            'total', 'toxina', 'traer', 'tramo', 'tratar', 'trauma', 'trebol',
            'tregua', 'treint', 'tren', 'tres', 'trigo', 'triste', 'triunfo',
            'trivial', 'trocar', 'tropa', 'tropezar', 'tubo', 'tumba', 'tumor',
            'tunel', 'turno', 'tutor', 'ultimo', 'unico', 'unir', 'usar', 'utensilio',
            'uva', 'vaca', 'vacuna', 'vago', 'valer', 'valle', 'valor', 'vapor',
            'variable', 'vara', 'variar', 'vario', 'vaso', 'vecino', 'veinte',
            'vela', 'venas', 'venir', 'ventana', 'verano', 'verbo', 'verdad',
            'verde', 'verso', 'vestir', 'vez', 'viaje', 'viajero', 'vida',
            'viejo', 'viento', 'vino', 'violin', 'virgen', 'virtud', 'virus',
            'visita', 'vista', 'vivir', 'vivo', 'volar', 'voltaje', 'volver',
            'vomito', 'voto', 'voz', 'vuelo', 'yate', 'yema', 'yerba',
            'yoga', 'yunque', 'zapato', 'zebra', 'zona'
        ];
        
        let level = 0;
        let letters = [];
        let targets = [];
        let found = [];
        let current = '';
        let score = 0;
        
        function randItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        
        function getWords(letterSet) {
            const dict = {};
            for (let word of WORDS) {
                if (word.length < 3) continue;
                const unique = [...new Set(word)];
                if (unique.every(l => letterSet.has(l))) {
                    const key = [...unique].sort().join('');
                    if (!dict[key] || word.length > dict[key].length) {
                        dict[key] = word;
                    }
                }
            }
            return Object.values(dict).slice(0, 10);
        }
        
        function init() {
            const w = WONDS[level % WONDS.length];
            document.getElementById('icon').textContent = w.icon;
            document.getElementById('name').textContent = w.name;
            document.getElementById('country').textContent = w.country;
            document.getElementById('level').textContent = level + 1;
            
            const used = new Set();
            while (used.size < 7) {
                used.add(String.fromCharCode(97 + Math.floor(Math.random() * 26)));
            }
            letters = shuffle([...used]);
            targets = getWords(new Set(letters));
            
            found = [];
            current = '';
            
            render();
        }
        
        function render() {
            const maxLen = targets.length ? Math.max(...targets.map(t => t.length)) : 4;
            
            const answer = document.getElementById('answer');
            answer.innerHTML = '';
            for (let i = 0; i < maxLen + 1; i++) {
                const slot = document.createElement('div');
                slot.className = 'letter-slot' + (current[i] ? ' filled' : '');
                slot.textContent = current[i] || '';
                answer.appendChild(slot);
            }
            
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            letters.forEach((letter, i) => {
                const btn = document.createElement('div');
                btn.className = 'wheel-letter';
                btn.textContent = letter.toUpperCase();
                btn.onclick = () => add(i);
                wheel.appendChild(btn);
            });
            
            const words = document.getElementById('words');
            words.innerHTML = '';
            targets.forEach(word => {
                const el = document.createElement('div');
                el.className = 'word-item' + (found.includes(word) ? ' found' : ' hidden');
                el.textContent = found.includes(word) ? word.toUpperCase() : '?'.repeat(word.length);
                words.appendChild(el);
            });
            
            document.getElementById('found').textContent = found.length;
            document.getElementById('total').textContent = targets.length;
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level + 1;
            
            const pct = targets.length ? (found.length / targets.length) * 100 : 0;
            document.getElementById('progress').style.width = pct + '%';
        }
        
        function add(index) {
            current += letters[index];
            document.querySelectorAll('.wheel-letter')[index].classList.add('used');
            render();
        }
        
        function clearIt() {
            document.querySelectorAll('.wheel-letter').forEach(l => l.classList.remove('used', 'correct'));
            current = '';
            render();
        }
        
        function submit() {
            const msg = document.getElementById('message');
            
            if (current.length < 3) {
                show('Mín 3 letras!', 'error');
                return;
            }
            
            if (targets.includes(current) && !found.includes(current)) {
                found.push(current);
                score += current.length * 20;
                show('✓ ' + current.toUpperCase(), 'success');
                
                document.querySelectorAll('.wheel-letter').forEach(l => {
                    if ([...current].includes(l.textContent.toLowerCase())) {
                        l.classList.add('correct');
                    }
                });
                
                if (found.length === targets.length) {
                    setTimeout(() => {
                        show('🎉 NIVEL COMPLETO!', 'win');
                        setTimeout(() => {
                            level++;
                            clearIt();
                            init();
                        }, 2000);
                    }, 500);
                }
            } else if (found.includes(current)) {
                show('Já encontrado!', 'error');
            } else {
                show('Tenta de novo!', 'error');
            }
            
            clearIt();
        }
        
        function show(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'show ' + type;
            setTimeout(() => msg.classList.remove('show'), 1500);
        }
        
        init();
    </script>
</body>
</html>
