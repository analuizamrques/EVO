<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVO - Wonders de Palabras</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --gold: #f0b429;
            --accent: #58a6ff;
            --found: #3fb950;
            --pink: #f778ba;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .wonder-card {
            background: var(--surface);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            max-width: 300px;
        }
        
        .wonder-card .emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .wonder-card .name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--gold);
        }
        
        .hint {
            color: var(--muted);
            font-size: 14px;
            margin-top: 8px;
        }
        
        .level-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .level-info span {
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 14px;
        }
        
        #letters-container {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 320px;
        }
        
        .letter-btn {
            width: 56px;
            height: 56px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .letter-btn:hover {
            border-color: var(--gold);
            transform: scale(1.1);
        }
        
        .letter-btn.used {
            opacity: 0.3;
            pointer-events: none;
        }
        
        #answer-slots {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            min-height: 56px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 320px;
        }
        
        .slot {
            width: 56px;
            height: 56px;
            background: var(--surface);
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .slot.filled {
            border-style: solid;
            border-color: var(--gold);
            background: rgba(240, 180, 41, 0.1);
        }
        
        #found-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 320px;
        }
        
        .found-word {
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid var(--border);
        }
        
        .found-word.correct {
            background: var(--found);
            color: var(--bg);
            border-color: var(--found);
        }
        
        button {
            background: var(--gold);
            color: var(--bg);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        #message {
            margin-top: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            display: none;
        }
        
        #message.show {
            display: block;
        }
        
        #message.success {
            background: var(--found);
            color: var(--bg);
        }
        
        .letter-btn.correct {
            animation: bounce 0.5s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>

        function getLevelWords(letters) {
            const len = letters.length;
            const wordDict = {};
            WORDS.forEach(w => {
                if (w.length >= 3 && w.length <= len) {
                    const canForm = [...w].every(l => letters.includes(l));
                    if (canForm) {
                        const sorted = [...w].sort().join('');
                        if (!wordDict[sorted] || w.length > wordDict[sorted].length) {
                            wordDict[sorted] = w;
                        }
                    }
                }
            });
            return Object.values(wordDict).filter(w => w.length >= 3).slice(0, 8);
        }
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function initLevel() {
            const wonder = WONDERS[currentLevel % WONDERS.length];
            document.getElementById('wonder-emoji').textContent = wonder.emoji;
            document.getElementById('wonder-name').textContent = wonder.name;
            document.getElementById('level-num').textContent = currentLevel + 1;
            
            // Generate letters from available words
            const allLetters = 'abcdefghijklmnopqrstuvwxyz';
            const letterSet = new Set();
            while (letterSet.size < 7) {
                const randomWord = WORDS[Math.floor(Math.random() * WORDS.length)];
                [...randomWord].forEach(l => letterSet.add(l));
            }
            letters = shuffle([...letterSet]).slice(0, 7);
            targetWords = getLevelWords(letters).slice(0, 6);
            
            foundWords = [];
            currentWord = '';
            
            renderLetters();
            renderSlots();
            renderFoundWords();
            
            document.getElementById('total-count').textContent = targetWords.length;
            document.getElementById('found-count').textContent = '0';
            document.getElementById('message').classList.remove('show');
        }
        
        function renderLetters() {
            const container = document.getElementById('letters-container');
            container.innerHTML = '';
            letters.forEach((letter, i) => {
                const btn = document.createElement('div');
                btn.className = 'letter-btn';
                btn.textContent = letter.toUpperCase();
                btn.onclick = () => selectLetter(i);
                container.appendChild(btn);
            });
        }
        
        function renderSlots() {
            const container = document.getElementById('answer-slots');
            container.innerHTML = '';
            const len = targetWords[foundWords.length]?.length || 4;
            for (let i = 0; i < Math.max(4, len); i++) {
                const slot = document.createElement('div');
                slot.className = 'slot' + (currentWord[i] ? ' filled' : '');
                slot.textContent = currentWord[i] || '';
                slot.onclick = () => removeLetter(i);
                container.appendChild(slot);
            }
        }
        
        function renderFoundWords() {
            const container = document.getElementById('found-words');
            container.innerHTML = '';
            targetWords.forEach(word => {
                const item = document.createElement('div');
                item.className = 'found-word' + (foundWords.includes(word) ? ' correct' : '');
                item.textContent = word.toUpperCase();
                container.appendChild(item);
            });
        }
        
        function selectLetter(index) {
            document.querySelectorAll('.letter-btn')[index].classList.add('used');
            currentWord += letters[index];
            renderSlots();
        }
        
        function removeLetter(index) {
            if (index < currentWord.length) {
                const removedLetter = currentWord[index];
                currentWord = currentWord.slice(0, index) + currentWord.slice(index + 1);
                
                // Find and free the letter
                const btns = document.querySelectorAll('.letter-btn');
                for (let i = 0; i < letters.length; i++) {
                    if (letters[i] === removedLetter && btns[i].classList.contains('used')) {
                        // Find first unused matching letter
                        let found = false;
                        for (let j = i; j < letters.length; j++) {
                            if (letters[j] === removedLetter && btns[j].classList.contains('used')) {
                                const usedCount = currentWord.split(removedLetter).length - 1;
                                const originalCount = letters.slice(0, j + 1).concat(letters.slice(j + 1)).join('').split(removedLetter).length;
                                if (usedCount < originalCount) {
                                    btns[j].classList.remove('used');
                                    found = true;
                                    break;
                                }
                            }
                        }
                        if (!found) {
                            btns[i].classList.remove('used');
                        }
                        break;
                    }
                }
                renderSlots();
            }
        }
        
        function checkWord() {
            if (targetWords.includes(currentWord) && !foundWords.includes(currentWord)) {
                foundWords.push(currentWord);
                points += currentWord.length * 10;
                document.getElementById('points').textContent = points;
                document.getElementById('found-count').textContent = foundWords.length;
                renderFoundWords();
                renderLetters();
                
                const message = document.getElementById('message');
                message.textContent = `✅ ${currentWord.toUpperCase()}!`;
                message.className = 'show success';
                
                if (foundWords.length === targetWords.length) {
                    message.textContent = `🎉 Nivel completado!`;
                    message.className = 'show success';
                }
            } else {
                // Reset letters
                document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('used'));
                const message = document.getElementById('message');
                message.textContent = `❌ Intenta de nuevo`;
                message.className = 'show';
            }
            
            currentWord = '';
            renderSlots();
        }
        
        function hint() {
            if (targetWords.length > foundWords.length) {
                const needed = targetWords[foundWords.length];
                const neededLetters = [...needed];
                const btns = document.querySelectorAll('.letter-btn');
                
                btns.forEach((btn, i) => {
                    const letter = letters[i];
                    if (neededLetters.includes(letter) && currentWord.includes(letter)) {
                        btn.classList.add('correct');
                    }
                });
            }
        }
        
        function nextLevel() {
            currentLevel++;
            initLevel();
        }
        
        // Enter to submit
        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                checkWord();
            }
        });
        
        // Start game
        initLevel();
    </script>
</body>
</html>
