<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-light: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --gold: #f0b429;
            --gold-dim: #b8962e;
            --green: #3fb950;
            --pink: #f778ba;
            --blue: #58a6ff;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            overflow-x: hidden;
        }
        
        /* Header */
        header {
            width: 100%;
            text-align: center;
            margin-bottom: 12px;
        }
        
        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Wonder Card */
        .wonder-card {
            background: linear-gradient(135deg, var(--surface), var(--surface-light));
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 12px 20px;
            margin-bottom: 12px;
            text-align: center;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 4px 20px rgba(240, 180, 41, 0.15);
        }
        
        .wonder-card .emoji {
            font-size: 36px;
            line-height: 1.2;
        }
        
        .wonder-card .name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gold);
            margin-top: 2px;
        }
        
        .wonder-card .hint {
            color: var(--muted);
            font-size: 11px;
            margin-top: 2px;
        }
        
        /* Progress Bar */
        .progress-bar {
            width: 100%;
            max-width: 340px;
            height: 6px;
            background: var(--surface);
            border-radius: 3px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--pink));
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 340px;
        }
        
        .stat {
            background: var(--surface);
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 12px;
            flex: 1;
            text-align: center;
        }
        
        .stat strong {
            color: var(--gold);
            display: block;
            font-size: 16px;
            margin-top: 2px;
        }
        
        /* Answer Preview */
        .answer-preview {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 16px;
            min-height: 44px;
        }
        
        .preview-letter {
            width: 38px;
            height: 44px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            transition: all 0.15s ease;
        }
        
        .preview-letter.filled {
            border-color: var(--gold);
            background: rgba(240, 180, 41, 0.15);
            animation: popIn 0.15s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.7); }
            100% { transform: scale(1); }
        }
        
        /* Letter Wheel */
        .letter-wheel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            max-width: 280px;
            margin-bottom: 16px;
        }
        
        .wheel-letter {
            width: 46px;
            height: 46px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.12s ease;
            user-select: none;
        }
        
        .wheel-letter:hover {
            border-color: var(--gold);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(240, 180, 41, 0.3);
        }
        
        .wheel-letter:active {
            transform: scale(0.95);
            background: var(--gold);
            color: var(--bg);
        }
        
        .wheel-letter.used {
            opacity: 0.2;
            pointer-events: none;
            transform: none;
            border-color: var(--border);
            box-shadow: none;
        }
        
        .wheel-letter.correct {
            background: var(--green);
            border-color: var(--green);
            color: var(--bg);
            animation: bounce 0.4s ease;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }
        
        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .ctrl-btn {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .ctrl-btn:hover {
            border-color: var(--muted);
            transform: scale(1.05);
        }
        
        .ctrl-btn.submit {
            background: var(--gold);
            color: var(--bg);
            border: none;
        }
        
        .ctrl-btn.submit:hover {
            box-shadow: 0 0 20px rgba(240, 180, 41, 0.4);
        }
        
        /* Word Grid */
        .word-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            max-width: 340px;
        }
        
        .word-cell {
            background: var(--surface);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid var(--border);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .word-cell.correct {
            background: var(--green);
            color: var(--bg);
            border-color: var(--green);
        }
        
        .word-cell.hidden {
            background: transparent;
            border-style: dashed;
            color: var(--muted);
        }
        
        /* Message Overlay */
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            padding: 20px 36px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 20px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
            z-index: 100;
            text-align: center;
        }
        
        #message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        #message.success {
            background: var(--green);
            color: var(--bg);
            box-shadow: 0 10px 40px rgba(63, 185, 80, 0.4);
        }
        
        #message.error {
            background: #f85149;
            color: white;
            box-shadow: 0 10px 40px rgba(248, 81, 73, 0.4);
        }
        
        #message.win {
            background: linear-gradient(135deg, var(--gold), var(--pink));
            color: var(--bg);
            font-size: 24px;
            box-shadow: 0 10px 40px rgba(240, 180, 41, 0.5);
        }
        
        /* Tutorial Modal */
        #tutorial {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        
        #tutorial.hidden {
            display: none;
        }
        
        .tutorial-content {
            background: var(--surface);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 24px;
            max-width: 340px;
            text-align: center;
        }
        
        .tutorial-content h2 {
            color: var(--gold);
            margin-bottom: 16px;
        }
        
        .tutorial-content p {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .tutorial-content .example {
            background: var(--bg);
            padding: 12px;
            border-radius: 10px;
            margin: 16px 0;
        }
        
        .tutorial-content .example-word {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
        }
    </style>
</head>

        const WONDERS = [
            { emoji: '🗼', name: 'Torre Eiffel', country: 'Paris' },
            { emoji: '🗽', name: 'Estátua Liberdade', country: 'NYC' },
            { emoji: '🕌', name: 'Taj Mahal', country: 'India' },
            { emoji: '🏛️', name: 'Partenon', country: 'Grecia' },
            { emoji: '🗿', name: 'Moai', country: 'Pascoa' },
            { emoji: '🏰', name: 'Castelo', country: 'Franca' },
            { emoji: '🕰️', name: 'Big Ben', country: 'Londres' },
            { emoji: '🏜️', name: 'Piramides', country: 'Egito' },
            { emoji: '⛩️', name: 'Templo', country: 'Japao' },
            { emoji: '🏟️', name: 'Coliseu', country: 'Roma' },
            { emoji: '🗿', name: 'Estatua Cristo', country: 'Rio' },
            { emoji: '🏯', name: 'Castelo Fuji', country: 'Japao' },
            { emoji: '🕌', name: 'Mesquita', country: 'Istambul' },
            { emoji: '🏛️', name: 'Panteon', country: 'Roma' },
            { emoji: '🌉', name: 'Golden Gate', country: 'SF' }
        ];
        
        let level = 0;
        let letters = [];
        let targets = [];
        let found = [];
        let current = '';
        let score = 0;
        
        function getWords(letterSet) {
            const dict = {};
            const setStr = [...letterSet].sort().join('');
            
            for (let word of WORDS) {
                if (word.length < 3) continue;
                const uniqueLetters = [...new Set(word)];
                if (uniqueLetters.every(l => letterSet.includes(l)) && word.length >= 3) {
                    const key = [...uniqueLetters].sort().join('');
                    if (!dict[key] || word.length > dict[key].length) {
                        dict[key] = word;
                    }
                }
            }
            return Object.values(dict).filter(w => w).slice(0, 10);
        }
        
        function randItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }
        
        function init() {
            const w = WONDERS[level % WONDERS.length];
            document.getElementById('wonder-emoji').textContent = w.emoji;
            document.getElementById('wonder-name').textContent = w.name;
            document.getElementById('level-num').textContent = level + 1;
            document.getElementById('country').textContent = w.country;
            
            // Generate 7 random letters from different words
            const used = new Set();
            for (let i = 0; i < 20; i++) {
                used.add(randItem(WORDS)[0]);
            }
            while (used.size < 7) {
                used.add(String.fromCharCode(97 + Math.floor(Math.random() * 26)));
            }
            letters = shuffle([...used]);
            targets = getWords(new Set(letters));
            
            found = [];
            current = '';
            
            render();
            updateProgress();
        }
        
        function render() {
            // Answer preview
            const preview = document.getElementById('answer-preview');
            preview.innerHTML = '';
            const maxLen = targets[found.length] ? Math.max(...targets.map(t => t.length)) : 4;
            
            for (let i = 0; i < maxLen + 2; i++) {
                const el = document.createElement('div');
                el.className = 'preview-letter' + (current[i] ? ' filled' : '');
                el.textContent = current[i] || '';
                el.onclick = () => removeLetter(i);
                preview.appendChild(el);
            }
            
            // Letter wheel
            const wheel = document.getElementById('letter-wheel');
            wheel.innerHTML = '';
            letters.forEach((letter, i) => {
                const el = document.createElement('div');
                el.className = 'wheel-letter';
                el.textContent = letter.toUpperCase();
                el.onclick = () => addLetter(i);
                wheel.appendChild(el);
            });
            
            // Word grid
            const grid = document.getElementById('word-grid');
            grid.innerHTML = '';
            targets.forEach(word => {
                const el = document.createElement('div');
                el.className = 'word-cell' + (found.includes(word) ? ' correct' : ' hidden');
                el.textContent = found.includes(word) ? word.toUpperCase() : '?'.repeat(word.length);
                grid.appendChild(el);
            });
            
            // Stats
            document.getElementById('total-count').textContent = targets.length;
            document.getElementById('found-count').textContent = found.length;
            document.getElementById('points').textContent = score;
            document.getElementById('level').textContent = level + 1;
        }
        
        function updateProgress() {
            const pct = targets.length ? (found.length / targets.length) * 100 : 0;
            document.getElementById('progress').style.width = pct + '%';
        }
        
        function addLetter(index) {
            current += letters[index];
            document.querySelectorAll('.wheel-letter')[index].classList.add('used');
            render();
        }
        
        function removeLetter(index) {
            if (index < current.length) {
                const letter = current[index];
                current = current.slice(0, index) + current.slice(index + 1);
                
                // Free letter
                const btns = document.querySelectorAll('.wheel-letter');
                for (let i = 0; i < letters.length; i++) {
                    if (letters[i] === letter && btns[i].classList.contains('used')) {
                        const usedCount = current.split(letter).length - 1;
                        const total = letters.join('').split(letter).length - 1;
                        if (usedCount < total) {
                            btns[i].classList.remove('used');
                            break;
                        }
                    }
                }
                render();
            }
        }
        
        function clearAnswer() {
            document.querySelectorAll('.wheel-letter').forEach(l => l.classList.remove('used'));
            current = '';
            render();
        }
        
        function scrambleLetters() {
            letters = shuffle(letters);
            render();
        }
        
        function submitWord() {
            const msg = document.getElementById('message');
            
            if (current.length < 3) {
                showMsg('Min 3 letras!', 'error');
                return;
            }
            
            if (targets.includes(current) && !found.includes(current)) {
                found.push(current);
                score += current.length * 15;
                showMsg(`✓ ${current.toUpperCase()}!`, 'success');
                
                // Animate letters
                document.querySelectorAll('.wheel-letter').forEach(l => {
                    if ([...current].includes(l.textContent.toLowerCase())) {
                        l.classList.add('correct');
                    }
                });
                
                if (found.length === targets.length) {
                    setTimeout(() => {
                        showMsg('🎉 NIVEL COMPLETO!', 'win');
                        setTimeout(() => {
                            level++;
                            init();
                        }, 2000);
                    }, 500);
                }
            } else if (found.includes(current)) {
                showMsg('Ja encontrado!', 'error');
            } else {
                showMsg('Tenta de novo!', 'error');
            }
            
            clearAnswer();
        }
        
        function showMsg(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'show ' + type;
            setTimeout(() => msg.classList.remove('show'), 1500);
        }
        
        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') submitWord();
            if (e.key === 'Backspace') current = current.slice(0, -1);
            if (e.key >= 'a' && e.key <= 'z') {
                const idx = letters.indexOf(e.key);
                if (idx >= 0) addLetter(idx);
            }
        });
        
        // Start game
        init();
    </script>
